<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Profitability — Maru Spaces</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0e0f11; --surface: #16181c; --surface2: #1e2128; --surface3: #262b33;
    --border: #2a2f3a; --border2: #363c48;
    --text: #e8eaf0; --text2: #8b91a0; --text3: #555c6e;
    --accent: #4f8ef7; --accent-dim: rgba(79,142,247,0.12);
    --green: #3ecf8e; --green-dim: rgba(62,207,142,0.12);
    --amber: #f5a623; --amber-dim: rgba(245,166,35,0.12);
    --red: #f26c6c; --red-dim: rgba(242,108,108,0.12);
    --purple: #a78bfa; --purple-dim: rgba(167,139,250,0.10);
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13px; line-height: 1.5; min-height: 100vh; }

  /* ── AUTH SCREEN ── */
  .auth-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--bg);
  }
  .auth-card {
    background: var(--surface); border: 1px solid var(--border2); border-radius: 12px;
    padding: 40px; width: 380px;
  }
  .auth-logo { margin-bottom: 32px; }
  .auth-title { font-family: var(--mono); font-size: 11px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 24px; }
  .auth-error { font-family: var(--mono); font-size: 11px; color: var(--red); background: var(--red-dim); border: 1px solid rgba(242,108,108,0.2); border-radius: 5px; padding: 10px 12px; margin-bottom: 16px; display: none; }
  .auth-error.show { display: block; }
  .auth-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .auth-field label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; }
  .auth-field input { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-family: var(--mono); font-size: 12px; padding: 9px 12px; outline: none; transition: border-color 0.15s; width: 100%; }
  .auth-field input:focus { border-color: var(--accent); }
  .auth-submit { width: 100%; margin-top: 8px; padding: 11px; background: var(--accent); border: none; border-radius: 5px; color: #fff; font-family: var(--mono); font-size: 12px; font-weight: 600; cursor: pointer; letter-spacing: 0.04em; transition: opacity 0.15s; }
  .auth-submit:hover { opacity: 0.85; }
  .auth-submit:disabled { opacity: 0.5; cursor: default; }
  .auth-toggle { margin-top: 16px; text-align: center; font-family: var(--mono); font-size: 11px; color: var(--text3); }
  .auth-toggle a { color: var(--accent); cursor: pointer; text-decoration: none; }
  .auth-toggle a:hover { text-decoration: underline; }

  /* ── APP SHELL ── */
  .shell { display: grid; grid-template-columns: 240px 1fr; grid-template-rows: 48px 1fr; min-height: 100vh; }

  /* TOPBAR */
  .topbar { grid-column: 1/-1; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 16px; }
  .topbar-divider { width: 1px; height: 18px; background: var(--border2); }
  .topbar-title { font-family: var(--mono); font-size: 11px; color: var(--text3); letter-spacing: 0.06em; }
  .topbar-right { display: flex; align-items: center; gap: 14px; margin-left: auto; }
  .topbar-user { font-family: var(--mono); font-size: 10px; color: var(--text3); }
  .save-indicator { font-family: var(--mono); font-size: 10px; color: var(--text3); opacity: 0; transition: opacity 0.3s; letter-spacing: 0.04em; }
  .save-indicator.show { opacity: 1; }
  .btn-signout { padding: 4px 10px; background: transparent; border: 1px solid var(--border2); border-radius: 4px; color: var(--text3); font-family: var(--mono); font-size: 10px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em; }
  .btn-signout:hover { border-color: var(--text2); color: var(--text2); }

  /* SIDEBAR */
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-section-label { font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text3); padding: 16px 16px 8px; }
  .project-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
  .project-item { padding: 9px 10px; border-radius: 6px; cursor: pointer; transition: background 0.15s; margin-bottom: 2px; border: 1px solid transparent; }
  .project-item:hover { background: var(--surface2); }
  .project-item.active { background: var(--accent-dim); border-color: rgba(79,142,247,0.25); }
  .project-item-name { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .project-item.active .project-item-name { color: var(--accent); }
  .project-item-meta { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-top: 2px; }
  .btn-new { margin: 8px; padding: 9px 12px; background: transparent; border: 1px dashed var(--border2); border-radius: 6px; color: var(--text3); font-family: var(--mono); font-size: 11px; cursor: pointer; transition: all 0.15s; text-align: left; letter-spacing: 0.04em; width: calc(100% - 16px); }
  .btn-new:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* MAIN */
  .main { overflow-y: auto; background: var(--bg); }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--text3); }
  .empty-state-icon { font-size: 32px; opacity: 0.4; }
  .empty-state-title { font-family: var(--mono); font-size: 13px; color: var(--text2); }

  /* TABS */
  .tab-bar { display: flex; align-items: center; border-bottom: 1px solid var(--border); padding: 0 24px; background: var(--surface); position: sticky; top: 0; z-index: 10; }
  .tab { padding: 14px 18px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; margin-bottom: -1px; white-space: nowrap; }
  .tab:hover { color: var(--text2); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-spacer { flex: 1; }
  .btn-danger { padding: 5px 12px; background: transparent; border: 1px solid var(--border2); border-radius: 4px; color: var(--text3); font-family: var(--mono); font-size: 10px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em; }
  .btn-danger:hover { border-color: var(--red); color: var(--red); background: var(--red-dim); }

  /* PANELS */
  .panel { padding: 28px 24px; max-width: 1200px; }
  .panel-section { margin-bottom: 32px; }
  .section-title { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text3); margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .section-note { font-size: 11px; color: var(--text3); margin-top: -8px; margin-bottom: 14px; line-height: 1.6; }

  /* FORMS */
  .field-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .field-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .field-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; }
  .field input { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-family: var(--mono); font-size: 12px; padding: 7px 10px; outline: none; transition: border-color 0.15s; width: 100%; }
  .field input:focus { border-color: var(--accent); }
  .field input[type="number"] { -moz-appearance: textfield; }
  .field input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .field-hint { font-size: 10px; color: var(--text3); }

  /* STAGE GRID */
  .stage-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .stage-cell { display: flex; flex-direction: column; gap: 5px; }
  .stage-cell label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; color: var(--text3); text-transform: uppercase; text-align: center; }
  .stage-cell input { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-family: var(--mono); font-size: 12px; padding: 7px 4px; outline: none; width: 100%; text-align: center; transition: border-color 0.15s; }
  .stage-cell input:focus { border-color: var(--accent); }
  .stage-sum { font-family: var(--mono); font-size: 10px; text-align: right; margin-top: 6px; }
  .stage-sum.ok { color: var(--green); } .stage-sum.bad { color: var(--red); }

  /* DATA TABLE */
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); padding: 8px 12px; text-align: right; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .data-table th:first-child { text-align: left; }
  .data-table td { font-family: var(--mono); font-size: 12px; color: var(--text2); padding: 9px 12px; text-align: right; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .data-table td:first-child { text-align: left; color: var(--text); font-weight: 500; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table .total-row td { border-top: 1px solid var(--border2); border-bottom: none; color: var(--text); font-weight: 600; padding-top: 10px; }
  .data-table .subconsult-row td { background: var(--purple-dim); }
  .data-table .subconsult-row td:first-child { color: var(--purple); }

  /* KPI */
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px 18px; }
  .kpi-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
  .kpi-value { font-family: var(--mono); font-size: 22px; font-weight: 600; line-height: 1; color: var(--text); }
  .kpi-sub { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-top: 5px; }
  .kpi-value.green { color: var(--green); } .kpi-value.amber { color: var(--amber); } .kpi-value.red { color: var(--red); }

  /* PROGRESS BAR */
  .var-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .var-bar-track { flex: 1; height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
  .var-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .var-bar-label { font-family: var(--mono); font-size: 10px; width: 40px; text-align: right; flex-shrink: 0; }

  /* ACTUALS TABLE */
  .actuals-table { width: 100%; border-collapse: collapse; }
  .actuals-table th { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); padding: 8px 10px; text-align: center; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .actuals-table th:first-child { text-align: left; }
  .actuals-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .actuals-table tr:last-child td { border-bottom: none; }
  .stage-header td { background: var(--surface2); font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.08em; color: var(--text2); padding: 8px 10px; text-transform: uppercase; }
  .subconsult-act-row td { background: var(--purple-dim); }
  .acat { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; padding-left: 24px; }
  .cell-m { font-family: var(--mono); font-size: 11px; text-align: center; color: var(--text2); }
  .pos { color: var(--green); } .neg { color: var(--red); }
  input.hrs-in { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--mono); font-size: 12px; padding: 5px 6px; width: 76px; text-align: center; outline: none; transition: border-color 0.15s; }
  input.hrs-in:focus { border-color: var(--accent); }
  input.rand-in { background: var(--surface2); border: 1px solid rgba(167,139,250,0.35); border-radius: 4px; color: var(--text); font-family: var(--mono); font-size: 12px; padding: 5px 6px; width: 110px; text-align: center; outline: none; transition: border-color 0.15s; }
  input.rand-in:focus { border-color: var(--purple); }
  input[type="number"] { -moz-appearance: textfield; }
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 28px; width: 460px; transform: translateY(12px); transition: transform 0.2s; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-title { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
  .btn-primary { padding: 9px 20px; background: var(--accent); border: none; border-radius: 5px; color: #fff; font-family: var(--mono); font-size: 11px; cursor: pointer; font-weight: 600; letter-spacing: 0.04em; transition: opacity 0.15s; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-secondary { padding: 9px 16px; background: transparent; border: 1px solid var(--border2); border-radius: 5px; color: var(--text3); font-family: var(--mono); font-size: 11px; cursor: pointer; transition: all 0.15s; }
  .btn-secondary:hover { border-color: var(--text2); color: var(--text2); }

  .pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-family: var(--mono); font-size: 10px; font-weight: 600; }
  .pill-green { background: var(--green-dim); color: var(--green); }
  .pill-amber { background: var(--amber-dim); color: var(--amber); }
  .pill-red { background: var(--red-dim); color: var(--red); }

  /* LOADING OVERLAY */
  .loading-overlay { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:200; }
  .loading-spinner { font-family:var(--mono); font-size:11px; color:var(--text3); letter-spacing:0.1em; animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
</style>
</head>

  <div class="loading-spinner">Initialising...</div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────
const SUPABASE_URL = 'https://qmqmpbpswbjqwbrinwsd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Sb0bZPf0PLYviyWJ6FdqCA_urWTe14h';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── CONSTANTS ──────────────────────────────────
const STAGES     = ['Stage 1','Stage 2','Stage 3','Stage 4.1','Stage 4.2','Stage 5','Stage 6'];
const STAGE_KEYS = ['s1','s2','s3','s4a','s4b','s5','s6'];
const CATS       = ['Partners & Equity Holders','Associates & Managers','Architectural Staff','Staff under Supervision'];
const CAT_KEYS   = ['partners','assoc','arch','staff'];
const WORKING_HRS = 2000;

const DEFAULT_ASSUMPTIONS = {
  costPct: 45,
  stageSplits:   {s1:2,s2:15,s3:20,s4a:10,s4b:20,s5:30,s6:3},
  staffMix: {
    s1: {partners:0.50,assoc:0.40,arch:0.10,staff:0.00},
    s2: {partners:0.40,assoc:0.45,arch:0.15,staff:0.00},
    s3: {partners:0.05,assoc:0.40,arch:0.35,staff:0.20},
    s4a:{partners:0.10,assoc:0.20,arch:0.40,staff:0.30},
    s4b:{partners:0.10,assoc:0.20,arch:0.40,staff:0.30},
    s5: {partners:0.05,assoc:0.20,arch:0.40,staff:0.35},
    s6: {partners:0.10,assoc:0.50,arch:0.40,staff:0.00},
  },
  subConsultBudget:{s1:0,s2:0,s3:0,s4a:0,s4b:0,s5:0,s6:0},
  rates:       {partners:2500},
  salaries:    {assoc:360000,arch:240000,staff:180000},
  multipliers: {assoc:2.5,arch:2.5,staff:2.5},
};

function emptyActuals() {
  const staff={};
  STAGE_KEYS.forEach(k=>{staff[k]={partners:0,assoc:0,arch:0,staff:0};});
  const subConsult={};
  STAGE_KEYS.forEach(k=>{subConsult[k]=0;});
  return {staff,subConsult};
}

// ── STATE ──────────────────────────────────────
let projects = [];
let activeId = null;
let currentUser = null;
let saveTimer = null;

// ── AUTH ───────────────────────────────────────
let authMode = 'signin'; // 'signin' | 'signup'

function toggleAuthMode() {
  authMode = authMode==='signin' ? 'signup' : 'signin';
  document.getElementById('authTitle').textContent = authMode==='signin' ? 'Sign in to continue' : 'Create an account';
  document.getElementById('authSubmit').textContent = authMode==='signin' ? 'Sign In' : 'Create Account';
  document.getElementById('authToggleText').textContent = authMode==='signin' ? "Don't have an account?" : 'Already have an account?';
  document.getElementById('authToggleLink').textContent = authMode==='signin' ? 'Create one' : 'Sign in';
  document.getElementById('authPasswordConfirmField').style.display = authMode==='signup' ? 'flex' : 'none';
  document.getElementById('authError').classList.remove('show');
}

async function handleAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const errEl = document.getElementById('authError');
  const btn = document.getElementById('authSubmit');

  errEl.classList.remove('show');
  if (!email || !password) { showAuthError('Email and password are required.'); return; }

  if (authMode==='signup') {
    const confirm = document.getElementById('authPasswordConfirm').value;
    if (password !== confirm) { showAuthError('Passwords do not match.'); return; }
  }

  btn.disabled = true;
  btn.textContent = authMode==='signin' ? 'Signing in…' : 'Creating account…';

  try {
    let result;
    if (authMode==='signin') {
      result = await sb.auth.signInWithPassword({email, password});
    } else {
      result = await sb.auth.signUp({email, password});
    }
    if (result.error) { showAuthError(result.error.message); }
    else if (authMode==='signup' && !result.data.session) {
      showAuthError('Account created — check your email to confirm, or ask your admin to disable email confirmation in Supabase Auth settings.');
    }
  } catch(e) {
    showAuthError('Connection error. Please try again.');
  }
  btn.disabled = false;
  btn.textContent = authMode==='signin' ? 'Sign In' : 'Create Account';
}

function showAuthError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg; el.classList.add('show');
}

document.addEventListener('keydown', e => {
  if (e.key==='Enter' && document.getElementById('authScreen').style.display!=='none') handleAuth();
});

async function signOut() {
  await sb.auth.signOut();
}

// ── SUPABASE DATA ──────────────────────────────
async function loadProjects() {
  const {data, error} = await sb
    .from('projects')
    .select('*')
    .order('created_at', {ascending: true});
  if (error) { console.error('Load error:', error); return []; }
  return data.map(row => ({
    id: row.id,
    name: row.name,
    no: row.no,
    client: row.client,
    fee: row.fee,
    assumptions: row.assumptions,
    actuals: row.actuals,
    createdAt: row.created_at,
  }));
}

async function saveProjectToDb(p) {
  const {error} = await sb.from('projects').upsert({
    id: p.id,
    name: p.name,
    no: p.no || null,
    client: p.client || null,
    fee: p.fee,
    assumptions: p.assumptions,
    actuals: p.actuals,
    created_by: currentUser.id,
  }, {onConflict: 'id'});
  if (error) console.error('Save error:', error);
  else flashSave();
}

async function deleteProjectFromDb(id) {
  const {error} = await sb.from('projects').delete().eq('id', id);
  if (error) console.error('Delete error:', error);
}

// Debounced save — waits 800ms after last change before writing
function scheduleSave(p) {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveProjectToDb(p), 800);
}

function flashSave() {
  const el = document.getElementById('saveIndicator');
  el.classList.add('show'); clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove('show'), 1800);
}

// ── PROJECT HELPERS ────────────────────────────
function getProject(id) { return projects.find(p=>p.id===id); }

function derivedRate(salary,mult) { return Math.round((salary/WORKING_HRS)*mult); }
function getRates(p) {
  const a=p.assumptions;
  return {
    partners: a.rates.partners,
    assoc:    derivedRate(a.salaries.assoc,  a.multipliers.assoc),
    arch:     derivedRate(a.salaries.arch,   a.multipliers.arch),
    staff:    derivedRate(a.salaries.staff,  a.multipliers.staff),
  };
}

function newProjectObj(name,no,fee,client) {
  return {
    id: crypto.randomUUID(),
    name, no, client,
    fee: parseFloat(fee)||350000,
    assumptions: JSON.parse(JSON.stringify(DEFAULT_ASSUMPTIONS)),
    actuals: emptyActuals(),
    createdAt: new Date().toISOString(),
  };
}

// ── MODAL ─────────────────────────────────────
function openNewProjectModal() {
  ['newProjectName','newProjectNo','newProjectFee','newProjectClient'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('newProjectModal').classList.add('open');
  setTimeout(()=>document.getElementById('newProjectName').focus(),100);
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.getElementById('newProjectModal').addEventListener('click',function(e){if(e.target===this)closeModal('newProjectModal');});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal('newProjectModal');});

async function createProject() {
  const name=document.getElementById('newProjectName').value.trim();
  if(!name){document.getElementById('newProjectName').focus();return;}
  const p=newProjectObj(name,document.getElementById('newProjectNo').value.trim(),document.getElementById('newProjectFee').value,document.getElementById('newProjectClient').value.trim());
  projects.push(p);
  activeId=p.id;
  closeModal('newProjectModal');
  renderAll();
  await saveProjectToDb(p);
}

async function deleteCurrentProject() {
  if(!activeId)return;
  const p=getProject(activeId);
  if(!confirm(`Delete "${p.name}"? This cannot be undone.`))return;
  const id=activeId;
  projects=projects.filter(x=>x.id!==id);
  activeId=projects.length?projects[0].id:null;
  renderAll();
  await deleteProjectFromDb(id);
}

// ── SIDEBAR ────────────────────────────────────
function renderSidebar() {
  const list=document.getElementById('projectList');
  if(!projects.length){list.innerHTML='<div style="padding:12px 10px;font-size:11px;color:var(--text3)">No projects yet</div>';return;}
  list.innerHTML=projects.map(p=>{
    const b=calcBudget(p);
    const mp=((p.fee-b.productionBudget)/p.fee*100).toFixed(1);
    const active=p.id===activeId?'active':'';
    return `<div class="project-item ${active}" onclick="selectProject('${p.id}')">
      <div class="project-item-name">${esc(p.name)}</div>
      <div class="project-item-meta">${esc(p.no||'—')}${p.client?' · '+esc(p.client):''}</div>
      <div class="project-item-meta" style="color:var(--green);margin-top:2px">R${fmtK(p.fee)} · ${mp}% margin</div>
    </div>`;
  }).join('');
}

let currentTab='setup';
function switchTab(tab) {
  currentTab=tab;
  ['setup','budget','actuals','summary'].forEach(t=>{
    document.getElementById(`tab-${t}`).classList.toggle('active',t===tab);
    document.getElementById(`panel-${t}`).style.display=t===tab?'block':'none';

// ── CALCULATIONS ───────────────────────────────
function calcBudget(p) {
  const a=p.assumptions, rates=getRates(p);
  const productionBudget=p.fee*(a.costPct/100);
  const stageBudgets={};
  STAGE_KEYS.forEach(k=>{stageBudgets[k]=p.fee*(a.stageSplits[k]/100);});
  const scBudget={};
  STAGE_KEYS.forEach(k=>{scBudget[k]=a.subConsultBudget[k]||0;});
  const totalScBudget=STAGE_KEYS.reduce((s,k)=>s+scBudget[k],0);
  const staffStageBudget={};
  STAGE_KEYS.forEach(k=>{staffStageBudget[k]=Math.max(0,stageBudgets[k]-scBudget[k]);});
  const stageAlloc={},budgetHours={};
  STAGE_KEYS.forEach(k=>{
    stageAlloc[k]={};budgetHours[k]={};
    CAT_KEYS.forEach(c=>{
      stageAlloc[k][c]=staffStageBudget[k]*a.staffMix[k][c];
      budgetHours[k][c]=rates[c]>0?stageAlloc[k][c]/rates[c]:0;
    });
  });
  const totalBudgetHours={};
  CAT_KEYS.forEach(c=>{totalBudgetHours[c]=STAGE_KEYS.reduce((s,k)=>s+budgetHours[k][c],0);});
  const totalHoursAll=CAT_KEYS.reduce((s,c)=>s+totalBudgetHours[c],0);
  const totalStageHours={};
  STAGE_KEYS.forEach(k=>{totalStageHours[k]=CAT_KEYS.reduce((s,c)=>s+budgetHours[k][c],0);});
  return {productionBudget,stageBudgets,staffStageBudget,scBudget,totalScBudget,stageAlloc,budgetHours,totalBudgetHours,totalHoursAll,totalStageHours,rates};
}

function calcActuals(p,b) {
  const rates=getRates(p);
  const actStaffCost={};
  STAGE_KEYS.forEach(k=>{actStaffCost[k]={};CAT_KEYS.forEach(c=>{actStaffCost[k][c]=(p.actuals.staff[k][c]||0)*rates[c];});});
  const totalActStaffHours={};
  CAT_KEYS.forEach(c=>{totalActStaffHours[c]=STAGE_KEYS.reduce((s,k)=>s+(p.actuals.staff[k][c]||0),0);});
  const totalActHoursAll=CAT_KEYS.reduce((s,c)=>s+totalActStaffHours[c],0);
  const totalActStaffCost=STAGE_KEYS.reduce((s,k)=>s+CAT_KEYS.reduce((s2,c)=>s2+actStaffCost[k][c],0),0);
  const totalActSc=STAGE_KEYS.reduce((s,k)=>s+(p.actuals.subConsult[k]||0),0);
  return {actStaffCost,totalActStaffHours,totalActHoursAll,totalActStaffCost,totalActSc,totalActCost:totalActStaffCost+totalActSc};
}

function updateField(key,val) {
  const p=getProject(activeId); if(!p)return;
  p[key]=val; renderSidebar(); scheduleSave(p);
}
function updateAssumption(key,val) {
  const p=getProject(activeId); p.assumptions[key]=val;
  const prodBud=p.fee*(p.assumptions.costPct/100);
  const el=document.getElementById('marginHint');
  if(el) el.textContent=`Implied gross margin: ${(100-p.assumptions.costPct).toFixed(1)}% · Production budget: R${fmt(prodBud)}`;
  refreshScNote(p); renderSidebar(); scheduleSave(p);
}
function refreshScNote(p) {
  const a=p.assumptions, prodBud=p.fee*(a.costPct/100);
  const totalSc=STAGE_KEYS.reduce((s,k)=>s+(a.subConsultBudget[k]||0),0);
  const el=document.getElementById('scNote');
  if(el) el.textContent=`Total sub-consultant budget: R${fmt(totalSc)} of R${fmt(prodBud)} production budget · Staff budget remaining: R${fmt(prodBud-totalSc)}`;
}
function updatePartnersRate(val){const p=getProject(activeId);p.assumptions.rates.partners=val;scheduleSave(p);}
function updateSalary(cat,val){
  const p=getProject(activeId);p.assumptions.salaries[cat]=val;
  const r=derivedRate(val,p.assumptions.multipliers[cat]);
  const el=document.getElementById(`rdisp-${cat}`);if(el)el.textContent=`R${fmt(r)}/hr`;
  scheduleSave(p);
}
function updateMultiplier(cat,val){
  const p=getProject(activeId);p.assumptions.multipliers[cat]=val;
  const r=derivedRate(p.assumptions.salaries[cat],val);
  const el=document.getElementById(`rdisp-${cat}`);if(el)el.textContent=`R${fmt(r)}/hr`;
  scheduleSave(p);
}
function updateStageSplit(k,val){
  const p=getProject(activeId);p.assumptions.stageSplits[k]=val;
  const sum=STAGE_KEYS.reduce((s,k2)=>s+Number(p.assumptions.stageSplits[k2]),0);
  const el=document.getElementById('stageSumLabel');
  if(el){el.className=`stage-sum ${Math.abs(sum-100)<0.01?'ok':'bad'}`;el.textContent=`Sum: ${sum.toFixed(1)}% ${Math.abs(sum-100)<0.01?'✓':'— must equal 100%'}`;}
  renderSidebar(); scheduleSave(p);
}
function updateScBudget(k,val){const p=getProject(activeId);p.assumptions.subConsultBudget[k]=val;refreshScNote(p);scheduleSave(p);}
function updateStaffMix(k,c,val){
  const p=getProject(activeId);p.assumptions.staffMix[k][c]=val;scheduleSave(p);
  const row=document.getElementById('mixTotals');if(!row)return;
  const cells=row.querySelectorAll('td');
  STAGE_KEYS.forEach((sk,i)=>{
    const s=(CAT_KEYS.reduce((t,c2)=>t+Number(p.assumptions.staffMix[sk][c2]),0)*100).toFixed(0);
    cells[i+1].style.color=Math.abs(s-100)<1?'var(--green)':'var(--red)';
    cells[i+1].textContent=s+'%';
  });
}

// ── ACTUALS PANEL ──────────────────────────────
function renderActualsPanel(p) {
  const b=calcBudget(p),act=calcActuals(p,b);
  let html=`<div style="margin-bottom:20px;font-size:12px;color:var(--text2)">Log actual hours per staff category and actual sub-consultant spend (R) per stage. Variance = Budget − Actual.</div>
  <div style="overflow-x:auto"><table class="actuals-table">
    <thead><tr><th style="width:230px">Stage / Category</th><th>Budget</th><th>Actual</th><th>Variance</th><th>Budget Cost (R)</th><th>Actual Cost (R)</th><th>Cost Var (R)</th></tr></thead><tbody>`;

  STAGE_KEYS.forEach((k,si)=>{
    const sActHrs=CAT_KEYS.reduce((s,c)=>s+(p.actuals.staff[k][c]||0),0);
    const sActStaffCost=CAT_KEYS.reduce((s,c)=>s+act.actStaffCost[k][c],0);
    const sActSc=p.actuals.subConsult[k]||0, sActTotal=sActStaffCost+sActSc;
    const sBudTotal=b.stageBudgets[k], sCostVar=sBudTotal-sActTotal, sHrVar=b.totalStageHours[k]-sActHrs;
    html+=`<tr class="stage-header"><td>${STAGES[si]}</td><td style="text-align:center">R${fmt(sBudTotal)}</td><td style="text-align:center">R${fmt(sActTotal)}</td><td style="text-align:center;color:${sCostVar>=0?'var(--green)':'var(--red)'}">${sCostVar>=0?'+':'−'}R${fmt(Math.abs(sCostVar))}</td><td style="text-align:center">${b.totalStageHours[k].toFixed(1)} hrs</td><td style="text-align:center">${sActHrs.toFixed(1)} hrs</td><td style="text-align:center;color:${sHrVar>=0?'var(--green)':'var(--red)'}">${sHrVar>=0?'+':''}${sHrVar.toFixed(1)} hrs</td></tr>`;
    CAT_KEYS.forEach((c,ci)=>{
      const bh=b.budgetHours[k][c],ah=p.actuals.staff[k][c]||0,hv=bh-ah,bc=b.stageAlloc[k][c],ac=act.actStaffCost[k][c],cv=bc-ac;
      html+=`<tr><td class="acat">${CATS[ci]}</td><td class="cell-m">${bh.toFixed(1)} hrs</td><td style="text-align:center"><input class="hrs-in" type="number" min="0" step="0.5" value="${ah||''}" placeholder="0" onchange="updateActualStaff('${k}','${c}',parseFloat(this.value)||0)"></td><td class="cell-m ${hv>=0?'pos':'neg'}">${hv>=0?'+':''}${hv.toFixed(1)}</td><td class="cell-m">R${fmt(bc)}</td><td class="cell-m">R${fmt(ac)}</td><td class="cell-m ${cv>=0?'pos':'neg'}">${cv>=0?'+':'−'}R${fmt(Math.abs(cv))}</td></tr>`;
    });
    const scb=b.scBudget[k],sca=p.actuals.subConsult[k]||0,scv=scb-sca;
    html+=`<tr class="subconsult-act-row"><td class="acat" style="color:var(--purple)">Sub-Consultants</td><td class="cell-m">R${fmt(scb)}</td><td style="text-align:center"><input class="rand-in" type="number" min="0" step="100" value="${sca||''}" placeholder="0" onchange="updateActualSc('${k}',parseFloat(this.value)||0)"></td><td class="cell-m ${scv>=0?'pos':'neg'}">${scv>=0?'+':'−'}R${fmt(Math.abs(scv))}</td><td class="cell-m">R${fmt(scb)}</td><td class="cell-m" style="color:var(--purple)">R${fmt(sca)}</td><td class="cell-m ${scv>=0?'pos':'neg'}">${scv>=0?'+':'−'}R${fmt(Math.abs(scv))}</td></tr>`;
  });

  const tcv=b.productionBudget-act.totalActCost, thv=b.totalHoursAll-act.totalActHoursAll;
  html+=`<tr class="total-row"><td>Grand Total</td><td class="cell-m">R${fmt(b.productionBudget)}</td><td class="cell-m">R${fmt(act.totalActCost)}</td><td class="cell-m" style="color:${tcv>=0?'var(--green)':'var(--red)'}">${tcv>=0?'+':'−'}R${fmt(Math.abs(tcv))}</td><td class="cell-m">${b.totalHoursAll.toFixed(1)} hrs</td><td class="cell-m">${act.totalActHoursAll.toFixed(1)} hrs</td><td class="cell-m" style="color:${thv>=0?'var(--green)':'var(--red)'}">${thv>=0?'+':''}${thv.toFixed(1)} hrs</td></tr></tbody></table></div>`;
  document.getElementById('panel-actuals').innerHTML=html;
}

function updateActualStaff(k,c,val){const p=getProject(activeId);p.actuals.staff[k][c]=val;scheduleSave(p);renderActualsPanel(p);}
function updateActualSc(k,val){const p=getProject(activeId);p.actuals.subConsult[k]=val;scheduleSave(p);renderActualsPanel(p);}

function renderSummaryPanel(p) {
  const b=calcBudget(p),act=calcActuals(p,b);
  const plannedM=p.fee-b.productionBudget,pmp=(plannedM/p.fee*100).toFixed(1);
  const forecastM=p.fee-act.totalActCost,fmp=(forecastM/p.fee*100).toFixed(1);
  const pctConsumed=b.productionBudget>0?Math.min(100,(act.totalActCost/b.productionBudget*100)).toFixed(0):0;
  const fmN=parseFloat(fmp);
  const mClass=fmN>=45?'green':fmN>=30?'amber':'red';
  const pClass=fmN>=45?'pill-green':fmN>=30?'pill-amber':'pill-red';
  const pText=fmN>=45?'On track':fmN>=30?'Watch':'At risk';

  document.getElementById('panel-summary').innerHTML=`
    <div style="margin-bottom:20px;display:flex;align-items:center;gap:12px">
      <div style="font-size:18px;font-weight:600;font-family:var(--mono)">${esc(p.name)}</div>
      <span class="pill ${pClass}">${pText}</span>
    </div>
    <div class="kpi-row">
      <div class="kpi-card"><div class="kpi-label">Fee Value</div><div class="kpi-value">R${fmtK(p.fee)}</div><div class="kpi-sub">${esc(p.no||'—')} · ${esc(p.client||'—')}</div></div>
      <div class="kpi-card"><div class="kpi-label">Planned Margin</div><div class="kpi-value green">${pmp}%</div><div class="kpi-sub">R${fmtK(plannedM)} · ${p.assumptions.costPct}% cost assumption</div></div>
      <div class="kpi-card"><div class="kpi-label">Forecast Margin</div><div class="kpi-value ${mClass}">${fmp}%</div><div class="kpi-sub">R${fmtK(forecastM)} · based on actuals to date</div></div>
      <div class="kpi-card"><div class="kpi-label">Budget Consumed</div><div class="kpi-value">${pctConsumed}%</div><div class="kpi-sub">R${fmtK(act.totalActCost)} of R${fmtK(b.productionBudget)}</div></div>
    </div>
    <div class="panel-section">
      <div class="section-title">Cost Breakdown: Actuals vs Budget</div>
      <table class="data-table" style="max-width:620px">
        <thead><tr><th>Category</th><th>Budget (R)</th><th>Actual (R)</th><th>Variance (R)</th></tr></thead>
        <tbody>
          ${CAT_KEYS.map((c,ci)=>{const bc=STAGE_KEYS.reduce((s,k)=>s+b.stageAlloc[k][c],0),ac=STAGE_KEYS.reduce((s,k)=>s+act.actStaffCost[k][c],0),v=bc-ac;return `<tr><td>${CATS[ci]}</td><td>R${fmt(bc)}</td><td>R${fmt(ac)}</td><td style="color:${v>=0?'var(--green)':'var(--red)'}">${v>=0?'+':'−'}R${fmt(Math.abs(v))}</td></tr>`;}).join('')}
          <tr class="subconsult-row"><td>Sub-Consultants</td><td>R${fmt(b.totalScBudget)}</td><td>R${fmt(act.totalActSc)}</td><td style="color:${(b.totalScBudget-act.totalActSc)>=0?'var(--green)':'var(--red)'}">${(b.totalScBudget-act.totalActSc)>=0?'+':'−'}R${fmt(Math.abs(b.totalScBudget-act.totalActSc))}</td></tr>
          <tr class="total-row"><td>Total Production Cost</td><td>R${fmt(b.productionBudget)}</td><td>R${fmt(act.totalActCost)}</td><td style="color:${(b.productionBudget-act.totalActCost)>=0?'var(--green)':'var(--red)'}">${(b.productionBudget-act.totalActCost)>=0?'+':'−'}R${fmt(Math.abs(b.productionBudget-act.totalActCost))}</td></tr>
        </tbody>
      </table>
    </div>
    <div class="panel-section">
      <div class="section-title">Stage Progress (Cost)</div>
      <div style="display:flex;flex-direction:column;gap:14px">
        ${STAGE_KEYS.map((k,i)=>{const bud=b.stageBudgets[k],actS=CAT_KEYS.reduce((s,c)=>s+act.actStaffCost[k][c],0)+(p.actuals.subConsult[k]||0),pct=bud>0?Math.min(100,actS/bud*100):0,cv=bud-actS,bc=pct>100?'var(--red)':pct>80?'var(--amber)':'var(--green)';return `<div><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-family:var(--mono);font-size:11px;color:var(--text2)">${STAGES[i]}</span><span style="font-family:var(--mono);font-size:11px;color:var(--text3)">R${fmt(actS)} / R${fmt(bud)} &nbsp;·&nbsp; <span style="color:${cv>=0?'var(--green)':'var(--red)'}">${cv>=0?'+':'−'}R${fmt(Math.abs(cv))} var</span></span></div><div class="var-bar-wrap"><div class="var-bar-track"><div class="var-bar-fill" style="width:${Math.min(100,pct)}%;background:${bc}"></div></div><div class="var-bar-label" style="color:${bc}">${pct.toFixed(0)}%</div></div></div>`;}).join('')}
      </div>
    </div>
    <div class="panel-section">
      <div class="section-title">Assumptions Used</div>
      <table class="data-table" style="max-width:560px">
        <tbody>
          <tr><td>Production Cost %</td><td>${p.assumptions.costPct}%</td></tr>
          <tr><td>Implied Gross Margin</td><td>${(100-p.assumptions.costPct).toFixed(1)}%</td></tr>
          <tr><td>Partners Rate</td><td>R${fmt(b.rates.partners)}/hr (manual)</td></tr>
          <tr><td>Associates Rate</td><td>R${fmt(b.rates.assoc)}/hr (R${fmt(p.assumptions.salaries.assoc)} sal. × ${p.assumptions.multipliers.assoc}×)</td></tr>
          <tr><td>Architectural Staff Rate</td><td>R${fmt(b.rates.arch)}/hr (R${fmt(p.assumptions.salaries.arch)} sal. × ${p.assumptions.multipliers.arch}×)</td></tr>
          <tr><td>Staff under Supervision Rate</td><td>R${fmt(b.rates.staff)}/hr (R${fmt(p.assumptions.salaries.staff)} sal. × ${p.assumptions.multipliers.staff}×)</td></tr>
        </tbody>
      </table>
    </div>`;
}

// ── ORCHESTRATION ──────────────────────────────
function selectProject(id) { activeId=id; renderAll(); }

function renderCurrentPanel() {
  const p=getProject(activeId); if(!p)return;
  if(currentTab==='setup') renderSetupPanel(p);
  else if(currentTab==='budget') renderBudgetPanel(p);
  else if(currentTab==='actuals') renderActualsPanel(p);
  else if(currentTab==='summary') renderSummaryPanel(p);
}

function renderAll() {
  renderSidebar();
  const has=!!activeId&&!!getProject(activeId);
  document.getElementById('emptyState').style.display=has?'none':'flex';
  document.getElementById('projectView').style.display=has?'block':'none';
  if(has) renderCurrentPanel();
}

// ── UTILS ──────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function fmt(n){if(isNaN(n)||n===null)return '0';return Number(n).toLocaleString('en-ZA',{minimumFractionDigits:0,maximumFractionDigits:0});}
function fmtK(n){if(n>=1000000)return(n/1000000).toFixed(2)+'m';if(n>=1000)return(n/1000).toFixed(0)+'k';return fmt(n);}

// ── INIT ───────────────────────────────────────
async function bootApp(session) {
  if (session?.user) {
    currentUser = session.user;
    document.getElementById('topbarUser').textContent = currentUser.email;
    projects = await loadProjects();
    activeId = projects.length ? projects[0].id : null;
    document.getElementById('loadingOverlay').style.display='none';
    document.getElementById('authScreen').style.display='none';
    document.getElementById('appShell').style.display='grid';
    renderAll();
  } else {
    currentUser = null; projects = []; activeId = null;
    document.getElementById('loadingOverlay').style.display='none';
    document.getElementById('appShell').style.display='none';
    document.getElementById('authScreen').style.display='flex';
  }
}

// On refresh, getSession() resolves immediately from localStorage.
// onAuthStateChange alone can miss this on initial load with sb_publishable keys.
// Safety timeout: if bootApp hangs for any reason, fall through to auth screen.
const _bootTimeout = setTimeout(() => {
  document.getElementById('loadingOverlay').style.display = 'none';
  document.getElementById('appShell').style.display = 'none';
  document.getElementById('authScreen').style.display = 'flex';
}, 5000);

(async () => {
  try {
    const { data: { session }, error } = await sb.auth.getSession();
    clearTimeout(_bootTimeout);
    await bootApp(session);
  } catch(e) {
    clearTimeout(_bootTimeout);
    console.error('Boot error:', e);
    document.getElementById('loadingOverlay').style.display = 'none';
    document.getElementById('authScreen').style.display = 'flex';
  }
})();

// Keep listening for sign-in / sign-out events during the session.
sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' || event === 'SIGNED_OUT' || event === 'TOKEN_REFRESHED') {
    await bootApp(session);
  }
});
</script>

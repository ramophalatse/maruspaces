<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Profitability — Maru Spaces</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2128;
    --surface3: #262b33;
    --border: #2a2f3a;
    --border2: #363c48;
    --text: #e8eaf0;
    --text2: #8b91a0;
    --text3: #555c6e;
    --accent: #4f8ef7;
    --accent-dim: rgba(79,142,247,0.12);
    --green: #3ecf8e;
    --green-dim: rgba(62,207,142,0.12);
    --amber: #f5a623;
    --amber-dim: rgba(245,166,35,0.12);
    --red: #f26c6c;
    --red-dim: rgba(242,108,108,0.12);
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── LAYOUT ── */
  .shell {
    display: grid;
    grid-template-columns: 240px 1fr;
    grid-template-rows: 48px 1fr;
    min-height: 100vh;
  }

  /* ── TOPBAR ── */
  .topbar {
    grid-column: 1/-1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
  }
  .topbar-logo {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text2);
  }
  .topbar-logo span { color: var(--accent); }
  .topbar-divider { width: 1px; height: 18px; background: var(--border2); }
  .topbar-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.06em;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-section-label {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 16px 16px 8px;
  }
  .project-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
  .project-item {
    padding: 9px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 2px;
    border: 1px solid transparent;
  }
  .project-item:hover { background: var(--surface2); }
  .project-item.active {
    background: var(--accent-dim);
    border-color: rgba(79,142,247,0.25);
  }
  .project-item-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .project-item.active .project-item-name { color: var(--accent); }
  .project-item-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    margin-top: 2px;
  }
  .project-item-margin {
    font-family: var(--mono);
    font-size: 10px;
    margin-top: 3px;
  }
  .btn-new {
    margin: 8px;
    padding: 9px 12px;
    background: transparent;
    border: 1px dashed var(--border2);
    border-radius: 6px;
    color: var(--text3);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    letter-spacing: 0.04em;
  }
  .btn-new:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* ── MAIN ── */
  .main {
    overflow-y: auto;
    background: var(--bg);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text3);
  }
  .empty-state-icon { font-size: 32px; opacity: 0.4; }
  .empty-state-title { font-family: var(--mono); font-size: 13px; color: var(--text2); }
  .empty-state-sub { font-size: 12px; }

  /* ── TABS ── */
  .tab-bar {
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    background: var(--surface);
    gap: 0;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .tab {
    padding: 14px 18px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    margin-bottom: -1px;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text2); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-spacer { flex: 1; }
  .project-actions { display: flex; gap: 8px; align-items: center; }
  .btn-danger {
    padding: 5px 12px;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--text3);
    font-family: var(--mono);
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .btn-danger:hover { border-color: var(--red); color: var(--red); background: var(--red-dim); }

  /* ── PANEL CONTENT ── */
  .panel { padding: 28px 24px; max-width: 1100px; }
  .panel-section { margin-bottom: 32px; }
  .section-title {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* ── FORMS ── */
  .field-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .field-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .field-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text3);
    text-transform: uppercase;
  }
  .field input, .field select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field input[type="number"] { -moz-appearance: textfield; }
  .field input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .field-hint { font-size: 10px; color: var(--text3); margin-top: 2px; }

  /* ── STAGE GRID ── */
  .stage-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }
  .stage-cell { display: flex; flex-direction: column; gap: 5px; }
  .stage-cell label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
    text-align: center;
  }
  .stage-cell input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 6px;
    outline: none;
    width: 100%;
    text-align: center;
    transition: border-color 0.15s;
  }
  .stage-cell input:focus { border-color: var(--accent); }
  .stage-sum {
    font-family: var(--mono);
    font-size: 10px;
    text-align: right;
    margin-top: 4px;
    padding-top: 4px;
  }
  .stage-sum.ok { color: var(--green); }
  .stage-sum.bad { color: var(--red); }

  /* ── DATA TABLE ── */
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 8px 12px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .data-table th:first-child { text-align: left; }
  .data-table td {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
    padding: 9px 12px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .data-table td:first-child { text-align: left; color: var(--text); font-weight: 500; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table .total-row td {
    border-top: 1px solid var(--border2);
    border-bottom: none;
    color: var(--text);
    font-weight: 600;
    padding-top: 10px;
  }
  .data-table .subtotal-row td { color: var(--text); background: var(--surface2); }

  /* ── KPI CARDS ── */
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
  }
  .kpi-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 8px;
  }
  .kpi-value {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    line-height: 1;
    color: var(--text);
  }
  .kpi-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    margin-top: 5px;
  }
  .kpi-value.green { color: var(--green); }
  .kpi-value.amber { color: var(--amber); }
  .kpi-value.red { color: var(--red); }

  /* ── VARIANCE BAR ── */
  .var-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .var-bar-track {
    flex: 1;
    height: 4px;
    background: var(--surface3);
    border-radius: 2px;
    overflow: hidden;
  }
  .var-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s ease;
  }
  .var-bar-label {
    font-family: var(--mono);
    font-size: 10px;
    width: 40px;
    text-align: right;
    flex-shrink: 0;
  }

  /* ── ACTUALS INPUT ── */
  .actuals-table { width: 100%; border-collapse: collapse; }
  .actuals-table th {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 8px 10px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .actuals-table th:first-child { text-align: left; }
  .actuals-table td {
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .actuals-table tr:last-child td { border-bottom: none; }
  .actuals-table .cat-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
  }
  .actuals-table input.hrs-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 6px;
    width: 68px;
    text-align: center;
    outline: none;
    transition: border-color 0.15s;
  }
  .actuals-table input.hrs-input:focus { border-color: var(--accent); }
  .actuals-table .cell-budget { font-family: var(--mono); font-size: 11px; color: var(--text3); text-align: center; }
  .actuals-table .cell-actual { font-family: var(--mono); font-size: 11px; text-align: center; }
  .actuals-table .cell-var { font-family: var(--mono); font-size: 11px; text-align: center; }
  .positive { color: var(--green); }
  .negative { color: var(--red); }
  .neutral { color: var(--text2); }
  .stage-header td {
    background: var(--surface2);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text2);
    padding: 7px 10px;
    text-transform: uppercase;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 28px;
    width: 460px;
    transform: translateY(12px);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-title {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 20px;
    letter-spacing: 0.04em;
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
  .btn-primary {
    padding: 9px 20px;
    background: var(--accent);
    border: none;
    border-radius: 5px;
    color: #fff;
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    font-weight: 600;
    letter-spacing: 0.04em;
    transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-secondary {
    padding: 9px 16px;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 5px;
    color: var(--text3);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .btn-secondary:hover { border-color: var(--text2); color: var(--text2); }

  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
  }
  .pill-green { background: var(--green-dim); color: var(--green); }
  .pill-amber { background: var(--amber-dim); color: var(--amber); }
  .pill-red { background: var(--red-dim); color: var(--red); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

  .save-indicator {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    opacity: 0;
    transition: opacity 0.3s;
    letter-spacing: 0.04em;
  }
  .save-indicator.show { opacity: 1; }
</style>
</head>
<body>

<div class="shell">
  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-logo">Maru <span>Spaces</span></div>
    <div class="topbar-divider"></div>
    <div class="topbar-title">Project Profitability Tool</div>
    <div style="flex:1"></div>
    <div class="save-indicator" id="saveIndicator">● Saved</div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section-label">Projects</div>
    <div class="project-list" id="projectList"></div>
    <button class="btn-new" onclick="openNewProjectModal()">+ New Project</button>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main">
    <div class="empty-state" id="emptyState">
      <div class="empty-state-icon">◈</div>
      <div class="empty-state-title">No project selected</div>
      <div class="empty-state-sub">Create a new project to get started</div>
    </div>
    <div id="projectView" style="display:none">
      <!-- Tab bar -->
      <div class="tab-bar">
        <div class="tab active" onclick="switchTab('setup')" id="tab-setup">Setup</div>
        <div class="tab" onclick="switchTab('budget')" id="tab-budget">Budget</div>
        <div class="tab" onclick="switchTab('actuals')" id="tab-actuals">Actuals</div>
        <div class="tab" onclick="switchTab('summary')" id="tab-summary">Summary</div>
        <div class="tab-spacer"></div>
        <div class="project-actions">
          <button class="btn-danger" onclick="deleteCurrentProject()">Delete project</button>
        </div>
      </div>
      <!-- Panels -->
      <div id="panel-setup" class="panel"></div>
      <div id="panel-budget" class="panel" style="display:none"></div>
      <div id="panel-actuals" class="panel" style="display:none"></div>
      <div id="panel-summary" class="panel" style="display:none"></div>
    </div>
  </main>
</div>

<!-- NEW PROJECT MODAL -->
<div class="modal-overlay" id="newProjectModal">
  <div class="modal">
    <div class="modal-title">New Project</div>
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div class="field">
        <label>Project Name</label>
        <input type="text" id="newProjectName" placeholder="e.g. Sandton Office Refurbishment">
      </div>
      <div class="field">
        <label>Project Number</label>
        <input type="text" id="newProjectNo" placeholder="e.g. MS-2026-014">
      </div>
      <div class="field-grid-2">
        <div class="field">
          <label>Fee Value (R)</label>
          <input type="number" id="newProjectFee" placeholder="350000">
        </div>
        <div class="field">
          <label>Client Name</label>
          <input type="text" id="newProjectClient" placeholder="Client">
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('newProjectModal')">Cancel</button>
      <button class="btn-primary" onclick="createProject()">Create Project</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════════════

const STAGES = ['Stage 1','Stage 2','Stage 3','Stage 4.1','Stage 4.2','Stage 5','Stage 6'];
const STAGE_KEYS = ['s1','s2','s3','s4a','s4b','s5','s6'];
const CATS = ['Partners & Equity Holders','Associates & Managers','Architectural Staff','Staff under Supervision'];
const CAT_KEYS = ['partners','assoc','arch','staff'];

const DEFAULT_ASSUMPTIONS = {
  costPct: 45,
  stageSplits: { s1:2, s2:15, s3:20, s4a:10, s4b:20, s5:30, s6:3 },
  staffMix: {
    s1:  { partners:0.5,  assoc:0.4,  arch:0.1,  staff:0 },
    s2:  { partners:0.4,  assoc:0.45, arch:0.15, staff:0 },
    s3:  { partners:0.05, assoc:0.4,  arch:0.35, staff:0.2 },
    s4a: { partners:0.1,  assoc:0.2,  arch:0.4,  staff:0.3 },
    s4b: { partners:0.1,  assoc:0.2,  arch:0.4,  staff:0.3 },
    s5:  { partners:0.05, assoc:0.2,  arch:0.4,  staff:0.35 },
    s6:  { partners:0.1,  assoc:0.5,  arch:0.4,  staff:0 },
  },
  rates: {
    partners: 1991,
    assoc: 1420,
    arch: 960,
    staff: 571,
  },
  salaries: {
    assoc: 360000,
    arch: 240000,
    staff: 180000,
  },
  sacapFactors: {
    assoc: 0.225,
    arch: 0.175,
    staff: 0.165,
  },
  phaseSplits: { design: 17, documentation: 50, supervision: 33 },
  hoursPerYear: 220 * 8, // working days × hrs/day — used only informally; hours derived from budget/rate
};

const STORAGE_KEY = 'maru_profitability_v2';

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { projects: [], activeId: null }; }
  catch { return { projects: [], activeId: null }; }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  flashSave();
}

let appData = loadData();

function flashSave() {
  const el = document.getElementById('saveIndicator');
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 1800);
}

function getProject(id) { return appData.projects.find(p => p.id === id); }

function newProjectTemplate(name, no, fee, client) {
  const a = JSON.parse(JSON.stringify(DEFAULT_ASSUMPTIONS));
  return {
    id: Date.now().toString(),
    name, no, client,
    fee: parseFloat(fee) || 350000,
    assumptions: a,
    actuals: {
      s1: { partners:0, assoc:0, arch:0, staff:0 },
      s2: { partners:0, assoc:0, arch:0, staff:0 },
      s3: { partners:0, assoc:0, arch:0, staff:0 },
      s4a:{ partners:0, assoc:0, arch:0, staff:0 },
      s4b:{ partners:0, assoc:0, arch:0, staff:0 },
      s5: { partners:0, assoc:0, arch:0, staff:0 },
      s6: { partners:0, assoc:0, arch:0, staff:0 },
    },
    createdAt: new Date().toISOString(),
  };
}

// ═══════════════════════════════════════════════
// CALCULATIONS
// ═══════════════════════════════════════════════

function calcBudget(project) {
  const { fee, assumptions: a } = project;
  const productionBudget = fee * (a.costPct / 100);

  // Stage budgets from fee splits
  const stageBudgets = {};
  STAGE_KEYS.forEach(k => { stageBudgets[k] = fee * (a.stageSplits[k] / 100); });

  // Staff allocation per stage (in rands)
  const stageAlloc = {};
  STAGE_KEYS.forEach(k => {
    stageAlloc[k] = {};
    CAT_KEYS.forEach(c => {
      stageAlloc[k][c] = stageBudgets[k] * a.staffMix[k][c];
    });
  });

  // Budgeted hours per stage per cat = allocation / rate
  const budgetHours = {};
  STAGE_KEYS.forEach(k => {
    budgetHours[k] = {};
    CAT_KEYS.forEach(c => {
      budgetHours[k][c] = stageAlloc[k][c] / a.rates[c];
    });
  });

  // Totals
  const totalBudgetHours = {};
  CAT_KEYS.forEach(c => { totalBudgetHours[c] = STAGE_KEYS.reduce((s,k) => s + budgetHours[k][c], 0); });

  const totalHoursAll = CAT_KEYS.reduce((s,c) => s + totalBudgetHours[c], 0);
  const totalStageHours = {};
  STAGE_KEYS.forEach(k => { totalStageHours[k] = CAT_KEYS.reduce((s,c) => s + budgetHours[k][c], 0); });

  return { productionBudget, stageBudgets, stageAlloc, budgetHours, totalBudgetHours, totalHoursAll, totalStageHours };
}

function calcActuals(project, budgetHours) {
  const { actuals, assumptions: a } = project;
  const actHours = actuals;

  // Actual cost per stage per cat
  const actCost = {};
  STAGE_KEYS.forEach(k => {
    actCost[k] = {};
    CAT_KEYS.forEach(c => { actCost[k][c] = (actHours[k][c] || 0) * a.rates[c]; });
  });

  const totalActHours = {};
  CAT_KEYS.forEach(c => { totalActHours[c] = STAGE_KEYS.reduce((s,k) => s + (actHours[k][c]||0), 0); });

  const totalActHoursAll = CAT_KEYS.reduce((s,c) => s + totalActHours[c], 0);
  const totalActCost = STAGE_KEYS.reduce((s,k) => s + CAT_KEYS.reduce((s2,c) => s2 + actCost[k][c], 0), 0);

  // Variance: positive = under budget (good)
  const varHours = {};
  CAT_KEYS.forEach(c => { varHours[c] = {}; STAGE_KEYS.forEach(k => { varHours[c][k] = budgetHours[k][c] - (actHours[k][c]||0); }); });

  return { actCost, totalActHours, totalActHoursAll, totalActCost, varHours };
}

function openNewProjectModal() {
  document.getElementById('newProjectName').value = '';
  document.getElementById('newProjectNo').value = '';
  document.getElementById('newProjectFee').value = '';
  document.getElementById('newProjectClient').value = '';
  document.getElementById('newProjectModal').classList.add('open');
  setTimeout(() => document.getElementById('newProjectName').focus(), 100);
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.getElementById('newProjectModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal('newProjectModal');
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal('newProjectModal'); });

function createProject() {
  const name = document.getElementById('newProjectName').value.trim();
  if (!name) { document.getElementById('newProjectName').focus(); return; }
  const no = document.getElementById('newProjectNo').value.trim();
  const fee = document.getElementById('newProjectFee').value;
  const client = document.getElementById('newProjectClient').value.trim();
  const p = newProjectTemplate(name, no, fee, client);
  appData.projects.push(p);
  appData.activeId = p.id;
  saveData(appData);
  closeModal('newProjectModal');
  renderAll();
}

function deleteCurrentProject() {
  if (!appData.activeId) return;
  const p = getProject(appData.activeId);
  if (!confirm(`Delete "${p.name}"? This cannot be undone.`)) return;
  appData.projects = appData.projects.filter(x => x.id !== appData.activeId);
  appData.activeId = appData.projects.length ? appData.projects[0].id : null;
  saveData(appData);
  renderAll();
}

function renderSidebar() {
  const list = document.getElementById('projectList');
  if (!appData.projects.length) {
    list.innerHTML = '<div style="padding:12px 10px;font-size:11px;color:var(--text3);">No projects yet</div>';
    return;
  }
  list.innerHTML = appData.projects.map(p => {
    const budget = calcBudget(p);
    const actuals = calcActuals(p, budget.budgetHours);
    const plannedMargin = ((p.fee - budget.productionBudget) / p.fee * 100).toFixed(1);
    const actualMarginVal = p.fee - actuals.totalActCost;
    const active = p.id === appData.activeId ? 'active' : '';
    return `<div class="project-item ${active}" onclick="selectProject('${p.id}')">
      <div class="project-item-name">${p.name}</div>
      <div class="project-item-meta">${p.no || '—'} ${p.client ? '· ' + p.client : ''}</div>
      <div class="project-item-margin" style="color:var(--text3)">
        R${fmt(p.fee)} · <span style="color:var(--green)">${plannedMargin}% planned</span>
      </div>
    </div>`;
  }).join('');
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function updateField(key, val) {
  const p = getProject(appData.activeId);
  if (!p) return;
  p[key] = val;
  saveData(appData);
  renderSidebar();
}

function updateAssumption(key, val) {
  const p = getProject(appData.activeId);
  p.assumptions[key] = val;
  // Update implied margin hint
  const hint = document.querySelector('.field-hint');
  if (hint) hint.textContent = `Implied gross margin: ${(100 - val).toFixed(1)}%`;
  saveData(appData);
  renderSidebar();
}

function updateRate(cat, val) {
  const p = getProject(appData.activeId);
  p.assumptions.rates[cat] = val;
  saveData(appData);
}

function updateSalary(cat, val) {
  const p = getProject(appData.activeId);
  p.assumptions.salaries[cat] = val;
  p.assumptions.rates[cat] = Math.round(val * p.assumptions.sacapFactors[cat]);
  saveData(appData);
  renderSetupPanel(p);
}

function updateSacap(cat, val) {
  const p = getProject(appData.activeId);
  p.assumptions.sacapFactors[cat] = val;
  p.assumptions.rates[cat] = Math.round(p.assumptions.salaries[cat] * val);
  saveData(appData);
  renderSetupPanel(p);
}

function updateStageSplit(k, val) {
  const p = getProject(appData.activeId);
  p.assumptions.stageSplits[k] = val;
  const sum = STAGE_KEYS.reduce((s,k2) => s + Number(p.assumptions.stageSplits[k2]),0);
  const el = document.querySelector('.stage-sum');
  if (el) {
    el.className = `stage-sum ${Math.abs(sum-100)<0.01?'ok':'bad'}`;
    el.textContent = `Sum: ${sum.toFixed(1)}% ${Math.abs(sum-100)<0.01?'✓':'— must equal 100%'}`;
  }
  saveData(appData);
  renderSidebar();
}

function updateStaffMix(k, c, val) {
  const p = getProject(appData.activeId);
  p.assumptions.staffMix[k][c] = val;
  saveData(appData);
  // Refresh column sums
  const p2 = getProject(appData.activeId);
  const a = p2.assumptions;
  const headers = document.querySelectorAll('.data-table thead th');
  const totalRow = document.querySelector('.total-row');

    STAGE_KEYS.forEach((sk, i) => {
      const sum = (CAT_KEYS.reduce((s,c2) => s + Number(a.staffMix[sk][c2]),0)*100).toFixed(0);

      cells[i+1].style.color = ok ? 'var(--green)' : 'var(--red)';
      cells[i+1].textContent = sum + '%';
    });
  }
}

function renderActualsPanel(p) {
  const b = calcBudget(p);
  const act = calcActuals(p, b.budgetHours);

  let html = `
    <div style="margin-bottom:20px;font-size:12px;color:var(--text2)">
      Log actual hours per staff category per stage. Variance = Budget − Actual. Positive variance = under budget.
    </div>
    <div style="overflow-x:auto">
    <table class="actuals-table">
      <thead>
        <tr>
          <th style="width:200px">Stage / Category</th>
          <th>Budget Hrs</th>
          <th>Actual Hrs</th>
          <th>Variance</th>
          <th>Budget Cost (R)</th>
          <th>Actual Cost (R)</th>
          <th>Cost Var (R)</th>
        </tr>
      </thead>
      <tbody>
  `;

  STAGE_KEYS.forEach((k,si) => {
    const stageBudgetHrs = b.totalStageHours[k];
    const stageActHrs = CAT_KEYS.reduce((s,c)=>s+(p.actuals[k][c]||0),0);
    const stageActCost = CAT_KEYS.reduce((s,c)=>s+act.actCost[k][c],0);
    const stageHrVar = stageBudgetHrs - stageActHrs;
    const stageCostVar = b.stageBudgets[k] - stageActCost;

    html += `<tr class="stage-header">
      <td>${STAGES[si]}</td>
      <td style="text-align:center">${stageBudgetHrs.toFixed(1)}</td>
      <td style="text-align:center">${stageActHrs.toFixed(1)}</td>
      <td style="text-align:center;color:${stageHrVar>=0?'var(--green)':'var(--red)'}">${stageHrVar>=0?'+':''}${stageHrVar.toFixed(1)}</td>
      <td style="text-align:center">R${fmt(b.stageBudgets[k])}</td>
      <td style="text-align:center">R${fmt(stageActCost)}</td>
      <td style="text-align:center;color:${stageCostVar>=0?'var(--green)':'var(--red)'}">${stageCostVar>=0?'+':''}R${fmt(Math.abs(stageCostVar))}</td>
    </tr>`;

    CAT_KEYS.forEach((c,ci) => {
      const budHrs = b.budgetHours[k][c];
      const actHrs = p.actuals[k][c] || 0;
      const hrVar = budHrs - actHrs;
      const budCost = b.stageAlloc[k][c];
      const actCost = act.actCost[k][c];
      const costVar = budCost - actCost;

      html += `<tr>
        <td class="cat-name" style="padding-left:24px;color:var(--text2)">${CATS[ci]}</td>
        <td class="cell-budget">${budHrs.toFixed(1)}</td>
        <td style="text-align:center">
          <input class="hrs-input" type="number" min="0" step="0.5" value="${actHrs||''}" placeholder="0"
            onchange="updateActual('${k}','${c}', parseFloat(this.value)||0)">
        </td>
        <td class="cell-var ${hrVar>=0?'positive':'negative'}">${hrVar>=0?'+':''}${hrVar.toFixed(1)}</td>
        <td class="cell-budget">R${fmt(budCost)}</td>
        <td class="cell-actual ${actHrs>0?'neutral':''}">R${fmt(actCost)}</td>
        <td class="cell-var ${costVar>=0?'positive':'negative'}">${costVar>=0?'+':''}R${fmt(Math.abs(costVar))}</td>
      </tr>`;
    });
  });

  // Grand totals
  const totalBudHrs = b.totalHoursAll;
  const totalActHrs = act.totalActHoursAll;
  const totalHrVar = totalBudHrs - totalActHrs;
  const totalActCost = act.totalActCost;
  const totalCostVar = b.productionBudget - totalActCost;

  html += `
      <tr class="total-row">
        <td>Grand Total</td>
        <td style="text-align:center">${totalBudHrs.toFixed(1)}</td>
        <td style="text-align:center">${totalActHrs.toFixed(1)}</td>
        <td style="text-align:center;color:${totalHrVar>=0?'var(--green)':'var(--red)'}">${totalHrVar>=0?'+':''}${totalHrVar.toFixed(1)}</td>
        <td style="text-align:center">R${fmt(b.productionBudget)}</td>
        <td style="text-align:center">R${fmt(totalActCost)}</td>
        <td style="text-align:center;color:${totalCostVar>=0?'var(--green)':'var(--red)'}">${totalCostVar>=0?'+':'−'}R${fmt(Math.abs(totalCostVar))}</td>
      </tr>
    </tbody>
    </table>
    </div>
  `;

  document.getElementById('panel-actuals').innerHTML = html;
}

function updateActual(k, c, val) {
  const p = getProject(appData.activeId);
  p.actuals[k][c] = val;
  saveData(appData);
  // Partial re-render of variance cells would be complex; full re-render is clean enough
  renderActualsPanel(p);
}

// ═══════════════════════════════════════════════
// SUMMARY PANEL
// ═══════════════════════════════════════════════

function renderSummaryPanel(p) {
  const b = calcBudget(p);
  const act = calcActuals(p, b.budgetHours);

  const plannedMargin = p.fee - b.productionBudget;
  const plannedMarginPct = (plannedMargin / p.fee * 100).toFixed(1);
  const forecastMargin = p.fee - act.totalActCost;
  const forecastMarginPct = (forecastMargin / p.fee * 100).toFixed(1);
  const totalActHrs = act.totalActHoursAll;
  const pctComplete = b.totalHoursAll > 0 ? Math.min(100, (totalActHrs / b.totalHoursAll * 100)).toFixed(0) : 0;

  const fmPctNum = parseFloat(forecastMarginPct);
  const marginClass = fmPctNum >= 45 ? 'green' : fmPctNum >= 30 ? 'amber' : 'red';
  const pillClass = fmPctNum >= 45 ? 'pill-green' : fmPctNum >= 30 ? 'pill-amber' : 'pill-red';
  const pillText = fmPctNum >= 45 ? 'On track' : fmPctNum >= 30 ? 'Watch' : 'At risk';

  document.getElementById('panel-summary').innerHTML = `
    <div style="margin-bottom:20px;display:flex;align-items:center;gap:12px">
      <div style="font-size:18px;font-weight:600;font-family:var(--mono)">${esc(p.name)}</div>
      <span class="pill ${pillClass}">${pillText}</span>
    </div>

    <div class="kpi-row">
      <div class="kpi-card">
        <div class="kpi-label">Fee Value</div>
        <div class="kpi-value">R${fmtK(p.fee)}</div>
        <div class="kpi-sub">${p.no||'—'} · ${p.client||'—'}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Planned Margin</div>
        <div class="kpi-value green">${plannedMarginPct}%</div>
        <div class="kpi-sub">R${fmtK(plannedMargin)} · ${p.assumptions.costPct}% cost assumption</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Forecast Margin (actuals to date)</div>
        <div class="kpi-value ${marginClass}">${forecastMarginPct}%</div>
        <div class="kpi-sub">R${fmtK(forecastMargin)} based on hours logged</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Hours Logged / Budgeted</div>
        <div class="kpi-value">${totalActHrs.toFixed(0)} / ${b.totalHoursAll.toFixed(0)}</div>
        <div class="kpi-sub">${pctComplete}% of budget consumed</div>
      </div>
    </div>

    <div class="panel-section">
      <div class="section-title">Stage Progress</div>
      <div style="display:flex;flex-direction:column;gap:14px">
        ${STAGE_KEYS.map((k,i) => {
          const budHrs = b.totalStageHours[k];
          const actHrs = CAT_KEYS.reduce((s,c)=>s+(p.actuals[k][c]||0),0);
          const pct = budHrs > 0 ? Math.min(100, actHrs / budHrs * 100) : 0;
          const actCost = CAT_KEYS.reduce((s,c)=>s+act.actCost[k][c],0);
          const costVar = b.stageBudgets[k] - actCost;
          const barColor = pct > 100 ? 'var(--red)' : pct > 80 ? 'var(--amber)' : 'var(--green)';
          return `<div>
            <div style="display:flex;justify-content:space-between;margin-bottom:6px">
              <span style="font-family:var(--mono);font-size:11px;color:var(--text2)">${STAGES[i]}</span>
              <span style="font-family:var(--mono);font-size:11px;color:var(--text3)">
                ${actHrs.toFixed(1)} / ${budHrs.toFixed(1)} hrs · 
                <span style="color:${costVar>=0?'var(--green)':'var(--red)'}">
                  ${costVar>=0?'+':'−'}R${fmt(Math.abs(costVar))} cost var
                </span>
              </span>
            </div>
            <div class="var-bar-wrap">
              <div class="var-bar-track">
                <div class="var-bar-fill" style="width:${Math.min(100,pct)}%;background:${barColor}"></div>
              </div>
              <div class="var-bar-label" style="color:${barColor}">${pct.toFixed(0)}%</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="panel-section">
      <div class="section-title">Assumptions Used</div>
      <table class="data-table" style="max-width:500px">
        <tbody>
          <tr><td>Production Cost %</td><td>${p.assumptions.costPct}%</td></tr>
          <tr><td>Implied Gross Margin</td><td>${(100-p.assumptions.costPct).toFixed(1)}%</td></tr>
          <tr><td>Partners Rate</td><td>R${fmt(p.assumptions.rates.partners)}/hr</td></tr>
          <tr><td>Associates Rate</td><td>R${fmt(p.assumptions.rates.assoc)}/hr</td></tr>
          <tr><td>Architectural Staff Rate</td><td>R${fmt(p.assumptions.rates.arch)}/hr</td></tr>
          <tr><td>Staff under Supervision Rate</td><td>R${fmt(p.assumptions.rates.staff)}/hr</td></tr>
        </tbody>
      </table>
    </div>
  `;
}

// ═══════════════════════════════════════════════
// ORCHESTRATION
// ═══════════════════════════════════════════════

function selectProject(id) {
  appData.activeId = id;
  saveData(appData);
  renderAll();
}

function renderCurrentPanel() {
  const p = getProject(appData.activeId);
  if (!p) return;
  if (currentTab === 'setup') renderSetupPanel(p);
  else if (currentTab === 'budget') renderBudgetPanel(p);
  else if (currentTab === 'actuals') renderActualsPanel(p);
  else if (currentTab === 'summary') renderSummaryPanel(p);
}

function renderAll() {
  renderSidebar();
  const hasActive = !!appData.activeId && !!getProject(appData.activeId);
  document.getElementById('emptyState').style.display = hasActive ? 'none' : 'flex';
  document.getElementById('projectView').style.display = hasActive ? 'block' : 'none';
  if (hasActive) renderCurrentPanel();
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════

function fmt(n) {
  if (isNaN(n)) return '0';
  return Number(n).toLocaleString('en-ZA', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function fmtK(n) {
  if (n >= 1000000) return (n/1000000).toFixed(2) + 'm';
  if (n >= 1000) return (n/1000).toFixed(0) + 'k';
  return fmt(n);
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
renderAll();
</script>
</body>
</html>

\"0.8\" preserveAspectRatio=\"xMidYMid meet\">\n          <rect x=\"30\" y=\"30\" width=\"180\" height=\"180\"><\u002Frect>\n          <line x1=\"30\" y1=\"100\" x2=\"210\" y2=\"100\"><\u002Fline>\n          <line x1=\"100\" y1=\"30\" x2=\"100\" y2=\"210\"><\u002Fline>\n          <line x1=\"100\" y1=\"160\" x2=\"210\" y2=\"160\"><\u002Fline>\n          <!-- Door swing -->\n          <path d=\"M 100 130 A 16 16 0 0 1 116 146\" stroke-width=\"0.5\"><\u002Fpath>\n          <line x1=\"100\" y1=\"130\" x2=\"100\" y2=\"146\" stroke-width=\"0.5\"><\u002Fline>\n          <!-- Stairs -->\n          <g stroke-width=\"0.5\">\n            <line x1=\"40\" y1=\"110\" x2=\"90\" y2=\"110\"><\u002Fline>\n            <line x1=\"40\" y1=\"120\" x2=\"90\" y2=\"120\"><\u002Fline>\n            <line x1=\"40\" y1=\"130\" x2=\"90\" y2=\"130\"><\u002Fline>\n            <line x1=\"40\" y1=\"140\" x2=\"90\" y2=\"140\"><\u002Fline>\n            <line x1=\"40\" y1=\"150\" x2=\"90\" y2=\"150\"><\u002Fline>\n          <\u002Fg>\n          <!-- North arrow -->\n          <g transform=\"translate(195,45)\" stroke=\"#A85A3C\" stroke-width=\"0.7\">\n            <circle cx=\"0\" cy=\"0\" r=\"8\"><\u002Fcircle>\n            <line x1=\"0\" y1=\"-8\" x2=\"0\" y2=\"8\"><\u002Fline>\n            <polygon points=\"0,-8 -3,-2 3,-2\" fill=\"#A85A3C\" stroke=\"none\"><\u002Fpolygon>\n            <text x=\"0\" y=\"-12\" text-anchor=\"middle\" font-family=\"JetBrains Mono\" font-size=\"7\" fill=\"#A85A3C\" stroke=\"none\">N<\u002Ftext>\n          <\u002Fg>\n        <\u002Fsvg>\n        <span class=\"caption\">Ground plan · 1:100<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- Isometric -->\n      <div class=\"illu\">\n        <span class=\"caption-num\">PL · 03<\u002Fspan>\n        <svg viewBox=\"0 0 240 240\" fill=\"none\" stroke=\"#1A1411\" stroke-width=\"0.8\" preserveAspectRatio=\"xMidYMid meet\">\n          <!-- Iso cube as building mass -->\n          <polygon points=\"120,40 200,80 200,180 120,220 40,180 40,80\"><\u002Fpolygon>\n          <line x1=\"120\" y1=\"40\" x2=\"120\" y2=\"220\"><\u002Fline>\n          <line x1=\"40\" y1=\"80\" x2=\"200\" y2=\"80\"><\u002Fline>\n          <!-- Roof line -->\n          <polyline points=\"60,90 120,60 180,90\" stroke=\"#A85A3C\"><\u002Fpolyline>\n          <!-- Windows on each face -->\n          <line x1=\"70\" y1=\"120\" x2=\"70\" y2=\"160\" stroke-width=\"0.5\"><\u002Fline>\n          <line x1=\"90\" y1=\"130\" x2=\"90\" y2=\"170\" stroke-width=\"0.5\"><\u002Fline>\n          <line x1=\"150\" y1=\"130\" x2=\"150\" y2=\"170\" stroke-width=\"0.5\"><\u002Fline>\n          <line x1=\"170\" y1=\"120\" x2=\"170\" y2=\"160\" stroke-width=\"0.5\"><\u002Fline>\n          <!-- Ground tick -->\n          <line x1=\"20\" y1=\"220\" x2=\"220\" y2=\"220\" stroke-width=\"0.4\" stroke-dasharray=\"2 2\"><\u002Fline>\n        <\u002Fsvg>\n        <span class=\"caption\">Massing study · isometric<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════════════════════════ -->\n<!-- §06 STATIONERY                                                -->\n<!-- ════════════════════════════════════════════════════════════ -->\n<section class=\"section\" data-screen-label=\"07 Stationery\">\n  <div class=\"shell\">\n    <div class=\"section-meta\">\n      <div class=\"sec-num\">§ 06 / 09<\u002Fdiv>\n      <div>\n        <div class=\"sec-eyebrow\">Application — Stationery<\u002Fdiv>\n        <h2 class=\"sec-title\">The first <em>handshake<\u002Fem>, on paper.<\u002Fh2>\n        <p class=\"sec-lede\">\n          The stationery suite is built for paper that pleases the hand — uncoated, warm-white, 300gsm for cards, 100gsm for correspondence. Restraint at the corners; air at the centre.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"statio-grid\">\n      <!-- Business cards -->\n      <div>\n        <div class=\"label\" style=\"margin-bottom: var(--s-4);\">A. Business card · 90 × 55 mm · Bone stock<\u002Fdiv>\n        <div class=\"bcard-row\">\n          <div class=\"bcard front\">\n            <div class=\"top\">\n              <div>\n                <div class=\"name\">Maru<\u002Fdiv>\n                <div class=\"role\">Spaces<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"corner-mark\">MS · 01<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"bot\">\n              <div>\n                <div class=\"name\" style=\"font-size:13px;\">Mapula Phalatsi<\u002Fdiv>\n                <div class=\"role\">Principal Architect<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"meta\">+27 11 484 0102<br>mapula@maruspaces.co.za<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"bcard back\">\n            <div class=\"center-mark\">\n              <img src=\"1f1e1ced-cffe-4ecb-acba-e3a58ef8189c\" alt=\"Maru logomark\" style=\"width:100%; height:auto; filter: invert(1) brightness(1.05);\">\n            <\u002Fdiv>\n            <div class=\"top\" style=\"position:relative; z-index:1;\">\n              <div class=\"corner-mark\" style=\"opacity:0.5;\">MARU · SPACES<\u002Fdiv>\n              <div class=\"corner-mark\" style=\"opacity:0.5;\">MMXXVI<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"bot\" style=\"position:relative; z-index:1;\">\n              <div class=\"meta\" style=\"opacity: 0.7;\">22 Wessels Rd<br>Houghton Estate<br>Johannesburg 2198<\u002Fdiv>\n              <div class=\"corner-mark\" style=\"opacity:0.5;\">ZA<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"body-copy\" style=\"font-size: 13px; color: var(--umber);\">\n          Letterpress impression on the front, foil or blind-emboss on the back. Specification: GF Smith Colorplan Vellum White, 350gsm, deckle edge optional.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <!-- Letterhead -->\n      <div>\n        <div class=\"label\" style=\"margin-bottom: var(--s-4);\">B. Letterhead · A4 · Bone uncoated<\u002Fdiv>\n        <div class=\"letterhead\">\n          <div class=\"lh-top\">\n            <div class=\"lh-mark\">\n              <img src=\"1f1e1ced-cffe-4ecb-acba-e3a58ef8189c\" alt=\"Maru logomark\" style=\"width:100%; height:auto; \">\n            <\u002Fdiv>\n            <div class=\"lh-meta\">\n              MARU SPACES (PTY) LTD<br>\n              22 WESSELS RD · HOUGHTON ESTATE<br>\n              JOHANNESBURG 2198 · ZA<br>\n              +27 11 484 0102 · MARUSPACES.CO.ZA\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"lh-eyebrow\">Project Brief — MS · 2026 · 047<\u002Fdiv>\n          <div class=\"lh-title\">House <em>Mokopane,<\u002Fem><br>a study in shadow.<\u002Fdiv>\n          <div class=\"lh-body\">\n            <p>The brief begins, as all our briefs do, with a walk on the site. The land falls south by 2.4 metres across the longer axis; a pair of marula trees holds the western edge. A house must be made that does not insist on itself.<\u002Fp>\n            <p>What follows is the proposal in three acts — siting, plan, and material — written for the client's reading and the contractor's use, alike. Drawings to follow under separate cover.<\u002Fp>\n            <p>Throughout this document, dimensions are given in millimetres, levels in metres above sea level, and all references to colour shall conform to the studio palette as set out in the Brand Guide, Vol. 01, §04.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"lh-foot\">\n            <span>Page 01 / 04<\u002Fspan>\n            <span>MS · BG · 2026.01<\u002Fspan>\n            <span>L. MOKOENA<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Envelope -->\n    <div style=\"margin-top: var(--s-7);\">\n      <div class=\"label\" style=\"margin-bottom: var(--s-4);\">C. Envelope · DL · Ivory stock<\u002Fdiv>\n      <div class=\"envelope\">\n        <div style=\"display:flex; justify-content:space-between; align-items: flex-start;\">\n          <div class=\"lh-mark\">\n            <img src=\"1f1e1ced-cffe-4ecb-acba-e3a58ef8189c\" alt=\"Maru logomark\" style=\"width:100%; height:auto; \">\n          <\u002Fdiv>\n          <div class=\"return\">\n            MARU SPACES (PTY) LTD<br>\n            22 WESSELS RD · JOHANNESBURG 2198 · ZA\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; justify-content:space-between; align-items:flex-end;\">\n          <div style=\"font-family: var(--mono); font-size: 9px; letter-spacing: 0.22em; color: var(--terracotta);\">— BY HAND —<\u002Fdiv>\n          <div style=\"width: 80px; height: 40px; border: 1px solid var(--rule); display:grid; place-items:center; font-family: var(--mono); font-size: 8px; letter-spacing: 0.2em; color: var(--umber);\">POSTAGE<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════════════════════════ -->\n<!-- §07 PHOTOGRAPHY                                               -->\n<!-- ════════════════════════════════════════════════════════════ -->\n<section class=\"section\" data-screen-label=\"08 Photography\">\n  <div class=\"shell\">\n    <div class=\"section-meta\">\n      <div class=\"sec-num\">§ 07 / 09<\u002Fdiv>\n      <div>\n        <div class=\"sec-eyebrow\">Image — Photographic Direction<\u002Fdiv>\n        <h2 class=\"sec-title\">Light, <em>shadow<\u002Fem>, surface, time.<\u002Fh2>\n        <p class=\"sec-lede\">\n          Photography is the second voice of the brand. Treat the lens as you would a measuring stick — calmly, accurately, and with a single subject in mind. Avoid the wide, over-saturated lifestyle convention.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"photo-grid\">\n      <div class=\"photo wide\">\n        <div class=\"ph-stripes\"><\u002Fdiv>\n        <span class=\"ph-tag\">PRIMARY · ARCHITECTURE<\u002Fspan>\n        <span class=\"ph-num\">PH · 01<\u002Fspan>\n        <span class=\"ph-cap\">Long, low compositions. Generous sky or shadow. The building, not the styling.<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"photo tall\">\n        <div class=\"ph-stripes\"><\u002Fdiv>\n        <span class=\"ph-tag\">DETAIL<\u002Fspan>\n        <span class=\"ph-num\">PH · 02<\u002Fspan>\n        <span class=\"ph-cap\">Close, slow studies of joinery, stone, and seam.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"photo-grid-2\">\n      <div class=\"photo\">\n        <div class=\"ph-stripes\"><\u002Fdiv>\n        <span class=\"ph-tag\">PORTRAIT<\u002Fspan>\n        <span class=\"ph-num\">PH · 03<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"photo\">\n        <div class=\"ph-stripes\"><\u002Fdiv>\n        <span class=\"ph-tag\">MATERIAL<\u002Fspan>\n        <span class=\"ph-num\">PH · 04<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"photo\">\n        <div class=\"ph-stripes\"><\u002Fdiv>\n        <span class=\"ph-tag\">LANDSCAPE<\u002Fspan>\n        <span class=\"ph-num\">PH · 05<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"photo-rules\">\n      <div class=\"do\">\n        <h4>Do<\u002Fh4>\n        <ul>\n          <li>Shoot in natural light — early morning or late afternoon. Long shadows are an ally.<\u002Fli>\n          <li>Compose with horizon, line, and gravity. One subject per frame.<\u002Fli>\n          <li>Honour material in close-up: stone, oak, brushed brass, lime plaster, raw concrete.<\u002Fli>\n          <li>Grade warm: lift the shadows toward umber, hold whites at bone, never blow highlights.<\u002Fli>\n          <li>Leave space. Generous negative areas allow type to breathe over the image.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"dont\">\n        <h4>Don't<\u002Fh4>\n        <ul>\n          <li>Use HDR, vivid skies, or saturated grading. Our colour lives in the prints, not the sky.<\u002Fli>\n          <li>Stage with people performing leisure. If a person is in frame, they are working or still.<\u002Fli>\n          <li>Fill the frame edge to edge. Crowded photographs read as commercial.<\u002Fli>\n          <li>Apply heavy filters, vignettes, or borders. The frame is the building.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════════════════════════ -->\n<!-- §08 LAYOUTS — DOCUMENTS & DECKS                               -->\n<!-- ════════════════════════════════════════════════════════════ -->\n<section class=\"section\" data-screen-label=\"09 Layouts\">\n  <div class=\"shell\">\n    <div class=\"section-meta\">\n      <div class=\"sec-num\">§ 08 / 09<\u002Fdiv>\n      <div>\n        <div class=\"sec-eyebrow\">Application — Documents &amp; Presentations<\u002Fdiv>\n        <h2 class=\"sec-title\">A house style for <em>every page<\u002Fem>.<\u002Fh2>\n        <p class=\"sec-lede\">\n          Proposals, project briefs, and slides share the same skeleton: a hairline header, a numbered section, a single dominant element, and a quiet foot. The grid does the heavy lifting; the typography does the rest.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"label\" style=\"margin-bottom: var(--s-4);\">A. Proposal document — A4<\u002Fdiv>\n    <div class=\"layout-grid\">\n      <div class=\"layout cover-prop\">\n        <div style=\"display:flex; justify-content: space-between; align-items: flex-start;\">\n          <div class=\"layout-eyebrow\">Project Proposal<\u002Fdiv>\n          <div class=\"layout-meta\">MS · 2026 · 047<br>VOL. 01<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top: auto;\">\n          <img src=\"1f1e1ced-cffe-4ecb-acba-e3a58ef8189c\" alt=\"Maru logomark\" style=\"width:56px; height:auto; \">\n          <div class=\"layout-title\">House <em>Mokopane<\u002Fem><br>— a study in shadow<\u002Fdiv>\n          <div class=\"layout-rule\"><\u002Fdiv>\n          <div class=\"layout-meta\" style=\"display:flex; justify-content: space-between;\">\n            <span>FOR · The Mokoena Family<\u002Fspan>\n            <span>JOHANNESBURG · 2026<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"layout proposal-page\">\n        <div class=\"layout-page-head\">\n          <div class=\"layout-eyebrow\">§ 02 — Siting<\u002Fdiv>\n          <div class=\"layout-meta\">PG. 04 / 24<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"layout-rule\"><\u002Fdiv>\n        <div class=\"layout-h2\">A house should not <em>insist<\u002Fem> on itself.<\u002Fdiv>\n        <div class=\"layout-pull\">\n          The land falls south by 2.4 metres across the longer axis. We choose to follow the fall, not fight it.\n        <\u002Fdiv>\n        <div class=\"layout-body\">\n          <p>The site is a 3,200 m² stand on the upper edge of the suburb, oriented north-east. Existing trees — a pair of marulas to the west — are retained as the principal landscape gesture, and the house is positioned to receive their afternoon shade in the public rooms.<\u002Fp>\n          <p>The proposed footprint is approximately 480 m² across two storeys, with a deliberately narrow plan to encourage cross-ventilation and to keep no inhabited room more than 4.5 metres from natural light.<\u002Fp>\n          <p>A long, low retaining wall in rammed earth tracks the contour to the south, anchoring the building to the landscape and creating a sheltered terrace at the lower threshold.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"layout-foot\">\n          <span>MARU SPACES<\u002Fspan>\n          <span>L. MOKOENA<\u002Fspan>\n          <span>2026.04<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"label\" style=\"margin-bottom: var(--s-4);\">B. Presentation deck — 16:9<\u002Fdiv>\n    <div class=\"deck-grid\">\n      <div class=\"deck dark\">\n        <div style=\"display:flex; justify-content: space-between;\">\n          <div class=\"deck-eyebrow\">Maru Spaces / Capability<\u002Fdiv>\n          <div class=\"deck-eyebrow\">01 / 24<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"deck-title\">A practice of <em>quiet<\u002Fem> consequence.<\u002Fdiv>\n        <div class=\"deck-foot\">\n          <span>JOHANNESBURG · CAPE TOWN<\u002Fspan>\n          <span>MMXXVI<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"deck cream\">\n        <div style=\"display:flex; justify-content: space-between;\">\n          <div class=\"deck-eyebrow\">§ 03 — Approach<\u002Fdiv>\n          <div class=\"deck-eyebrow\">07 / 24<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: end; flex: 1; padding: 24px 0;\">\n          <div class=\"deck-title\" style=\"font-size: 36px;\">Drawn before <em>it is built<\u002Fem>.<\u002Fdiv>\n          <div style=\"font-family: var(--editorial); font-style: italic; font-size: 13px; line-height: 1.5; color: var(--umber);\">\n            We treat documentation as design. Proposals, plans, and presentations are part of the architecture — not the wrapper around it.\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"deck-foot\">\n          <span>MARU SPACES<\u002Fspan>\n          <span>—<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"deck terra\">\n        <div style=\"display:flex; justify-content: space-between;\">\n          <div class=\"deck-eyebrow\">Quote · Plate 04<\u002Fdiv>\n          <div class=\"deck-eyebrow\">12 / 24<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"deck-title\" style=\"font-family: var(--editorial); font-style: italic; font-weight: 300; font-size: 38px; line-height: 1.2; max-width: 22ch;\">\n          The work should feel as if it has always been there.\n        <\u002Fdiv>\n        <div class=\"deck-foot\">\n          <span>— L. MOKOENA<\u002Fspan>\n          <span>—<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"deck bone\">\n        <div style=\"display:flex; justify-content: space-between;\">\n          <div class=\"deck-eyebrow\">§ 06 — Selected Works<\u002Fdiv>\n          <div class=\"deck-eyebrow\">18 / 24<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns: repeat(3, 1fr); gap: 12px; flex: 1; padding: 16px 0;\">\n          <div style=\"background: var(--ivory); position: relative; border: 1px solid var(--rule-soft);\">\n            <div style=\"position:absolute; inset:0; background-image: repeating-linear-gradient(135deg, transparent 0 8px, rgba(168,90,60,0.08) 8px 9px);\"><\u002Fdiv>\n            <div style=\"position:absolute; bottom:8px; left:8px; font-family:var(--mono); font-size:7px; letter-spacing:0.18em; color: var(--umber);\">01 · MOKOPANE<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background: var(--ivory); position: relative; border: 1px solid var(--rule-soft);\">\n            <div style=\"position:absolute; inset:0; background-image: repeating-linear-gradient(135deg, transparent 0 8px, rgba(168,90,60,0.08) 8px 9px);\"><\u002Fdiv>\n            <div style=\"position:absolute; bottom:8px; left:8px; font-family:var(--mono); font-size:7px; letter-spacing:0.18em; color: var(--umber);\">02 · CONSTANTIA<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background: var(--ivory); position: relative; border: 1px solid var(--rule-soft);\">\n            <div style=\"position:absolute; inset:0; background-image: repeating-linear-gradient(135deg, transparent 0 8px, rgba(168,90,60,0.08) 8px 9px);\"><\u002Fdiv>\n            <div style=\"position:absolute; bottom:8px; left:8px; font-family:var(--mono); font-size:7px; letter-spacing:0.18em; color: var(--umber);\">03 · TSHWANE<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"deck-foot\">\n          <span>SELECTED · 2018 — 2026<\u002Fspan>\n          <span>—<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════════════════════════ -->\n<!-- §09 DIGITAL                                                   -->\n<!-- ════════════════════════════════════════════════════════════ -->\n<section class=\"section\" data-screen-label=\"10 Digital\">\n  <div class=\"shell\">\n    <div class=\"section-meta\">\n      <div class=\"sec-num\">§ 09 / 09<\u002Fdiv>\n      <div>\n        <div class=\"sec-eyebrow\">Application — Digital Surfaces<\u002Fdiv>\n        <h2 class=\"sec-title\">The same hand, <em>on screen<\u002Fem>.<\u002Fh2>\n        <p class=\"sec-lede\">\n          Digital follows the same rules as print: hairline rules, generous margins, monochrome composition, and a single Terracotta detail. We do not chase animation; we let typography do the work.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"label\" style=\"margin-bottom: var(--s-4);\">A. Web — homepage hero<\u002Fdiv>\n    <div class=\"web-frame\">\n      <div class=\"web-chrome\">\n        <span class=\"dot\"><\u002Fspan><span class=\"dot\"><\u002Fspan><span class=\"dot\"><\u002Fspan>\n        <span class=\"url\">maruspaces.co.za<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"web-content\">\n        <nav class=\"web-nav\">\n          <div class=\"lh-mark\">\n            <img src=\"1f1e1ced-cffe-4ecb-acba-e3a58ef8189c\" alt=\"Maru logomark\" style=\"width:100%; height:auto; \">\n          <\u002Fdiv>\n          <ul>\n            <li>Practice<\u002Fli>\n            <li>Work<\u002Fli>\n            <li>Journal<\u002Fli>\n            <li>Studio<\u002Fli>\n            <li>Contact<\u002Fli>\n          <\u002Ful>\n          <div style=\"font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; color: var(--terracotta);\">— ZA · 2026<\u002Fdiv>\n        <\u002Fnav>\n        <div class=\"web-hero\">\n          <div>\n            <div style=\"font-family: var(--mono); font-size: 11px; letter-spacing: 0.22em; color: var(--terracotta); margin-bottom: 16px;\">— EST. JOHANNESBURG, 2014<\u002Fdiv>\n            <h1>A practice<br>of <em>quiet<\u002Fem><br>consequence.<\u002Fh1>\n            <p class=\"sub\">An architectural studio working across government, private, and high-end residential briefs from Johannesburg, South Africa.<\u002Fp>\n            <div style=\"display:flex; gap: 14px; margin-top: 28px;\">\n              <div style=\"font-family: var(--sans); font-weight: 400; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; padding: 12px 20px; background: var(--ink); color: var(--bone);\">Selected Works →<\u002Fdiv>\n              <div style=\"font-family: var(--sans); font-weight: 400; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; padding: 12px 20px; border: 1px solid var(--ink); color: var(--ink);\">The Practice<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"web-hero-img\">\n            <div class=\"ph-stripes\"><\u002Fdiv>\n            <span class=\"lab\">PL · 01 · HOUSE MOKOPANE<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"label\" style=\"margin-top: var(--s-9); margin-bottom: var(--s-4);\">B. Social — square posts<\u002Fdiv>\n    <div class=\"social-grid\">\n      <div class=\"social bone\">\n        <div style=\"display:flex; justify-content: space-between;\">\n          <div class=\"social-eyebrow\">§ Studio Note · 04<\u002Fdiv>\n          <div class=\"social-mark\">\n            <img src=\"1f1e1ced-cffe-4ecb-acba-e3a58ef8189c\" alt=\"Maru logomark\" style=\"width:100%; height:auto; \">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"social-title\">Drawn before<br>it is <em>built<\u002Fem>.<\u002Fdiv>\n        <div style=\"display:flex; justify-content: space-between; font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; color: var(--umber);\">\n          <span>MARUSPACES.CO.ZA<\u002Fspan>\n          <span>04 / 12<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"social terra\">\n        <div style=\"display:flex; justify-content: space-between;\">\n          <div class=\"social-eyebrow\">— New Project<\u002Fdiv>\n          <div class=\"social-eyebrow\">05 / 12<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"social-title\" style=\"font-family: var(--editorial); font-style: italic; font-weight: 300;\">A study<br>in shadow.<\u002Fdiv>\n        <div style=\"display:flex; justify-content: space-between; font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; opacity: 0.8;\">\n          <span>HOUSE MOKOPANE · 2026<\u002Fspan>\n          <span>↗<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"social umber\">\n        <div style=\"display:flex; justify-content: space-between;\">\n          <div class=\"social-eyebrow\">§ Quote<\u002Fdiv>\n          <div class=\"social-mark\">\n            <img src=\"1f1e1ced-cffe-4ecb-acba-e3a58ef8189c\" alt=\"Maru logomark\" style=\"width:100%; height:auto; filter: invert(1) brightness(1.05);\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"social-title\" style=\"font-family: var(--editorial); font-style: italic; font-weight: 300; font-size: 22px; line-height: 1.3; max-width: 16ch;\">\n          “The work should feel as if it has always been there.”\n        <\u002Fdiv>\n        <div style=\"display:flex; justify-content: space-between; font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; opacity: 0.7;\">\n          <span>— L. MOKOENA<\u002Fspan>\n          <span>06 / 12<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════════════════════════ -->\n<!-- §10 VOICE                                                     -->\n<!-- ════════════════════════════════════════════════════════════ -->\n<section class=\"section\" data-screen-label=\"11 Voice\">\n  <div class=\"shell\">\n    <div class=\"section-meta\">\n      <div class=\"sec-num\">§ 10 / 09 — addendum<\u002Fdiv>\n      <div>\n        <div class=\"sec-eyebrow\">Voice — How We Sound<\u002Fdiv>\n        <h2 class=\"sec-title\">Quiet, <em>considered<\u002Fem>, certain.<\u002Fh2>\n        <p class=\"sec-lede\">\n          We write the way we draw — short lines, careful punctuation, no hyperbole. The voice is calm and confident, never breathless. We earn authority through specificity, not adjectives.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"voice-grid\">\n      <div class=\"voice-card\">\n        <h4>Quiet<\u002Fh4>\n        <div class=\"pair we\">We say <em>“The land falls south by 2.4 metres.”<\u002Fem><\u002Fdiv>\n        <div class=\"pair not\">Not <em>“Stunning, breathtaking site!”<\u002Fem><\u002Fdiv>\n        <div class=\"pair we\">We say <em>“Drawings to follow under separate cover.”<\u002Fem><\u002Fdiv>\n        <div class=\"pair not\">Not <em>“Watch this space — exciting things ahead!!”<\u002Fem><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"voice-card\">\n        <h4>Considered<\u002Fh4>\n        <div class=\"pair we\">We say <em>“We chose to follow the fall, not fight it.”<\u002Fem><\u002Fdiv>\n        <div class=\"pair not\">Not <em>“We always go the extra mile.”<\u002Fem><\u002Fdiv>\n        <div class=\"pair we\">We say <em>“Every line earns its place.”<\u002Fem><\u002Fdiv>\n        <div class=\"pair not\">Not <em>“We push the envelope.”<\u002Fem><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"voice-card\">\n        <h4>Certain<\u002Fh4>\n        <div class=\"pair we\">We say <em>“The wall is rammed earth, 450mm thick.”<\u002Fem><\u002Fdiv>\n        <div class=\"pair not\">Not <em>“A really cool, organic-feeling wall.”<\u002Fem><\u002Fdiv>\n        <div class=\"pair we\">We say <em>“For thirty years, not three.”<\u002Fem><\u002Fdiv>\n        <div class=\"pair not\">Not <em>“Built to last forever and always!”<\u002Fem><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"tone-examples\">\n      <div class=\"tone-block\">\n        <div class=\"tone-label\">Project caption — image accompaniment<\u002Fdiv>\n        <p class=\"ex\">House Mokopane, north-east elevation. The rammed-earth wall holds the contour; the marula trees hold the afternoon.<\u002Fp>\n        <p class=\"ex\">Plate 04 — a study in shadow. Photographed at 16:42, late autumn.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"tone-block\">\n        <div class=\"tone-label\">Email — first reply to a new enquiry<\u002Fdiv>\n        <p class=\"ex\">Thank you for writing. We would be glad to meet.<br>Could you share the address of the site, and a date that suits you in the next fortnight? I will bring a measuring tape, a sketch pad, and an open mind.<br>— Lerato, for Maru Spaces.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════════════════════════ -->\n<!-- COLOPHON                                                      -->\n<!-- ════════════════════════════════════════════════════════════ -->\n<footer class=\"colophon\" data-screen-label=\"12 Colophon\">\n  <div class=\"shell\">\n    <div class=\"colophon-grid\">\n      <div>\n        <h3>Maru <em>Spaces<\u002Fem><\u002Fh3>\n        <p style=\"font-family: var(--editorial); font-style: italic; font-size: 18px; color: var(--clay-soft); max-width: 28ch; line-height: 1.4;\">\n          A document of identity and intent. Written in Johannesburg, set in Bodoni Moda and Cormorant Garamond, printed on bone.\n        <\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div class=\"col-meta\">Studio<\u002Fdiv>\n        <dl>\n          <dd>22 Wessels Rd<\u002Fdd>\n          <dd>Houghton Estate<\u002Fdd>\n          <dd>Johannesburg 2198<\u002Fdd>\n          <dd style=\"margin-top: 12px;\">+27 11 484 0102<\u002Fdd>\n          <dd>maruspaces.co.za<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n      <div>\n        <div class=\"col-meta\">Document<\u002Fdiv>\n        <dl>\n          <dd>Edition I, Rev. A<\u002Fdd>\n          <dd>MS · BG · 2026.01<\u002Fdd>\n          <dd>30 pages, A3<\u002Fdd>\n          <dd style=\"margin-top: 12px;\">Authored by<\u002Fdd>\n          <dd>R. Phalatse, Studio Maru<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n      <div>\n        <div class=\"col-meta\">Type<\u002Fdiv>\n        <dl>\n          <dd>DM Serif Display — Display<\u002Fdd>\n          <dd>Cormorant Garamond — Editorial<\u002Fdd>\n          <dd>DM Sans — Body &amp; UI<\u002Fdd>\n          <dd>JetBrains Mono — Technical<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stamp\">\n      <span>© Maru Spaces (Pty) Ltd · MMXXVI<\u002Fspan>\n      <span>— ◆ —<\u002Fspan>\n      <span>This guide supersedes all prior issues<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n\n\n<\u002Fbody><\u002Fhtml>"

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ntialiased;\n  text-rendering: optimizeLegibility;\n}\n\nimg { display: block; max-width: 100%; }\n\n/* ─── Layout primitives ─────────────────────────────────────── */\n.shell { max-width: var(--maxw); margin: 0 auto; padding: 0 var(--gutter); }\n\n.section { padding: var(--s-11) 0; position: relative; }\n.section + .section { border-top: 1px solid var(--rule-soft); }\n\n.section-meta {\n  display: grid;\n  grid-template-columns: 80px 1fr;\n  gap: var(--s-6);\n  align-items: baseline;\n  margin-bottom: var(--s-9);\n}\n.sec-num {\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--umber);\n  padding-top: 8px;\n}\n.sec-eyebrow {\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--umber);\n  margin-bottom: var(--s-5);\n}\n.sec-title {\n  font-family: var(--display);\n  font-weight: 400;\n  font-size: clamp(48px, 6vw, 88px);\n  line-height: 0.96;\n  letter-spacing: -0.015em;\n  color: var(--ink);\n}\n.sec-title em {\n  font-style: italic;\n  font-family: var(--editorial);\n  font-weight: 300;\n}\n.sec-lede {\n  font-family: var(--editorial);\n  font-weight: 300;\n  font-size: clamp(20px, 1.6vw, 26px);\n  line-height: 1.45;\n  margin-top: var(--s-6);\n  max-width: 56ch;\n  color: var(--umber);\n}\n\n.rule { height: 1px; background: var(--rule); width: 100%; }\n.rule-hair { height: 1px; background: var(--rule-soft); width: 100%; }\n\n.label {\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--umber);\n}\n\n.body-copy {\n  font-size: 15px;\n  line-height: 1.65;\n  max-width: 60ch;\n  color: var(--ink);\n}\n.body-copy p + p { margin-top: 1em; }\n\n/* ─── Cover ─────────────────────────────────────────────────── */\n.cover {\n  min-height: 100vh;\n  background: var(--bone);\n  position: relative;\n  overflow: hidden;\n  border-bottom: 1px solid var(--rule);\n}\n.cover-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  min-height: 100vh;\n}\n.cover-left {\n  padding: var(--s-8) var(--gutter);\n  display: flex;\n  flex-direction: column;\n  justify-content: space-between;\n  border-right: 1px solid var(--rule);\n}\n.cover-right {\n  padding: var(--s-8) var(--gutter);\n  display: flex;\n  flex-direction: column;\n  justify-content: space-between;\n  background: var(--ivory);\n}\n\n.cover-topbar {\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--umber);\n}\n\n.cover-title {\n  font-family: var(--display);\n  font-weight: 400;\n  font-size: clamp(72px, 11vw, 180px);\n  line-height: 0.88;\n  letter-spacing: -0.025em;\n  color: var(--ink);\n}\n.cover-title .ital {\n  font-family: var(--editorial);\n  font-style: italic;\n  font-weight: 300;\n  display: block;\n  font-size: 0.42em;\n  letter-spacing: 0.02em;\n  margin-top: 0.4em;\n  color: var(--umber);\n}\n\n.cover-foot {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: var(--s-6);\n  padding-top: var(--s-6);\n  border-top: 1px solid var(--rule);\n}\n.cover-foot dt {\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--umber);\n  margin-bottom: var(--s-2);\n}\n.cover-foot dd {\n  font-family: var(--editorial);\n  font-size: 17px;\n  line-height: 1.3;\n  color: var(--ink);\n}\n\n.cover-mark {\n  width: 100%;\n  aspect-ratio: 1;\n  display: grid;\n  place-items: center;\n  position: relative;\n}\n\n.mark-svg { width: 56%; height: auto; }\n\n.cover-caption {\n  font-family: var(--editorial);\n  font-style: italic;\n  font-size: 18px;\n  color: var(--umber);\n  max-width: 38ch;\n  line-height: 1.4;\n}\n\n/* ─── §01 Foundation ────────────────────────────────────────── */\n.foundation-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: var(--s-9);\n  align-items: start;\n}\n.principle-list {\n  display: grid;\n  gap: var(--s-7);\n}\n.principle {\n  display: grid;\n  grid-template-columns: 60px 1fr;\n  gap: var(--s-5);\n  padding-top: var(--s-5);\n  border-top: 1px solid var(--rule-soft);\n}\n.principle-num {\n  font-family: var(--display);\n  font-style: italic;\n  font-weight: 400;\n  font-size: 28px;\n  color: var(--terracotta);\n  line-height: 1;\n}\n.principle-title {\n  font-family: var(--display);\n  font-weight: 400;\n  font-size: 26px;\n  line-height: 1.1;\n  margin-bottom: var(--s-3);\n  letter-spacing: -0.01em;\n}\n.principle-body {\n  font-size: 14px;\n  line-height: 1.6;\n  color: var(--umber);\n  max-width: 42ch;\n}\n\n.pull-quote {\n  font-family: var(--editorial);\n  font-style: italic;\n  font-weight: 300;\n  font-size: clamp(28px, 3vw, 42px);\n  line-height: 1.25;\n  color: var(--ink);\n  padding: var(--s-7) 0;\n  border-top: 1px solid var(--rule);\n  border-bottom: 1px solid var(--rule);\n  position: relative;\n}\n.pull-quote::before {\n  content: \"“\";\n  font-family: var(--display);\n  font-size: 1.6em;\n  position: absolute;\n  top: -0.15em;\n  left: -0.4em;\n  color: var(--terracotta);\n  line-height: 1;\n}\n\n/* ─── §02 Logo ──────────────────────────────────────────────── */\n.logo-stage {\n  background: var(--paper);\n  padding: var(--s-10) var(--s-9);\n  display: grid;\n  place-items: center;\n  border: 1px solid var(--rule-soft);\n  position: relative;\n  min-height: 480px;\n}\n.logo-stage .corner {\n  position: absolute;\n  width: 14px;\n  height: 14px;\n  border: 1px solid var(--umber);\n}\n.logo-stage .c-tl { top: 16px; left: 16px; border-right: 0; border-bottom: 0; }\n.logo-stage .c-tr { top: 16px; right: 16px; border-left: 0; border-bottom: 0; }\n.logo-stage .c-bl { bottom: 16px; left: 16px; border-right: 0; border-top: 0; }\n.logo-stage .c-br { bottom: 16px; right: 16px; border-left: 0; border-top: 0; }\n.logo-stage .stage-tag {\n  position: absolute;\n  b e */\n.misuse-grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: var(--s-5);\n}\n.misuse-cell {\n  background: var(--paper);\n  border: 1px solid var(--rule-soft);\n  aspect-ratio: 1;\n  display: grid;\n  place-items: center;\n  position: relative;\n  padding: var(--s-5);\n  overflow: hidden;\n}\n.misuse-cell .x {\n  position: absolute;\n  top: 12px;\n  right: 12px;\n  width: 22px;\n  height: 22px;\n  border-radius: 50%;\n  background: var(--terracotta);\n  color: var(--bone);\n  display: grid;\n  place-items: center;\n  font-family: var(--sans);\n  font-size: 14px;\n  font-weight: 500;\n  line-height: 1;\n}\n.misuse-cell .lab {\n  position: absolute;\n  bottom: 12px;\n  left: 12px;\n  right: 12px;\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--umber);\n}\n\n/* ─── §03 Type ──────────────────────────────────────────────── */\n.type-spec {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 0;\n  border: 1px solid var(--rule-soft);\n}\n.type-card {\n  padding: var(--s-7);\n  border-right: 1px solid var(--rule-soft);\n  border-bottom: 1px solid var(--rule-soft);\n}\n.type-card:nth-child(2n) { border-right: 0; }\n.type-card:nth-last-child(-n+2) { border-bottom: 0; }\n.type-card .role {\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--terracotta);\n  margin-bottom: var(--s-5);\n}\n.type-card .name {\n  font-family: var(--display);\n  font-weight: 400;\n  font-size: 36px;\n  letter-spacing: -0.01em;\n  margin-bottom: var(--s-3);\n}\n.type-card.serif-card .name { font-family: var(--editorial); }\n.type-card.sans-card .name { font-family: var(--sans); font-weight: 400; }\n.type-card.mono-card .name { font-family: var(--mono); font-size: 28px; }\n.type-card .meta {\n  font-family: var(--mono);\n  font-size: 11px;\n  color: var(--umber);\n  margin-bottom: var(--s-6);\n  letter-spacing: 0.05em;\n}\ ize: 8px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  margin-top: 3px;\n  opacity: 0.7;\n}\n.bcard .meta {\n  font-family: var(--mono);\n  font-size: 8px;\n  letter-spacing: 0.18em;\n  text-align: right;\n  line-height: 1.6;\n  opacity: 0.85;\n}\n.bcard .corner-mark {\n  font-family: var(--mono);\n  font-size: 8px;\n  letter-spacing: 0.22em;\n  opacity: 0.6;\n}\n.bcard.back .center-mark {\n  position: absolute;\n  inset: 0;\n  display: grid;\n  place-items: center;\n}\n.bcard.back .center-mark svg { width: 30%; height: auto; }\n\n.letterhead {\n  aspect-ratio: 1 / 1.414;\n  background: var(--bone);\n  border: 1px solid var(--rule-soft);\n  padding: 32px 40px;\n  position: relative;\n  display: flex;\n  flex-direction: column;\n  box-shadow: 0 30px 60px -30px rgba(26, 20, 17, 0.25);\n  overflow: hidden;\n}\n.letterhead .lh-top { display: flex; justify-content: space-between; align-items: flex-start; padding-bottom: 18px; border-bottom: 1px solid var(--rule); }\n.letterhead .lh-mark svg { width: 64px; height: auto; }\n.letterhead .lh-meta { font-family: var(--mono); font-size: 8px; letter-spacing: 0.18em; line-height: 1.7; text-align: right; color: var(--umber); }\n.letterhead .lh-title { font-family: var(--display); font-size: 28px; font-weight: 400; margin-top: 32px; letter-spacing: -0.01em; line-height: 1.05; max-width: 16ch; }\n.letterhead .lh-title em { font-family: var(--editorial); font-style: italic; font-weight: 300; }\n.letterhead .lh-eyebrow { font-family: var(--mono); font-size: 8px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--terracotta); margin-top: 18px; }\n.letterhead .lh-body { margin-top: 18px; font-size: 9px; line-height: 1.7; color: var(--ink); column-count: 2; column-gap: 18px; flex: 1; }\n.letterhead .lh-body p + p { margin-top: 0.7em; }\n.letterhead .lh-foot { display: flex; justify-content: space-between; padding-top: 12px; border-top: 1px solid var(--rule); margin-top: 12px; font-family: var(--mono); font-size: 7px; letter-spacing: 0.2em; color: var(--umber); }\n\n.envelope {\n  aspect-ratio: 2.2 / 1;\n  background: var(--ivory);\n  border: 1px solid var(--rule-soft);\n  padding: var(--s-5) var(--s-6);\n  position: relative;\n  display: flex;\n  flex-direction: column;\n  justify-content: space-between;\n  box-shadow: 0 30px 60px -30px rgba(26, 20, 17, 0.25);\n}\n.envelope .lh-mark svg { width: 48px; height: auto; }\n.envelope .return { font-family: var(--mono); font-size: 8px; letter-spacing: 0.18em; line-height: 1.7; color: var(--umber); }\n\n/* ─── §07 Photography ──────────────────────────────────────── */\n.photo-grid {\n  display: grid;\n  grid-template-columns: 1.4fr 1fr;\n  gap: var(--s-5);\n}\n.photo-grid-2 {\n  display: grid;\n  grid-template-columns: 1fr 1fr 1fr;\n  gap: var(--s-5);\n  margin-top: var(--s-5);\n}\n.photo {\n  background: var(--ivory);\n  position: relative;\n  overflow: hidden;\n  display: grid;\n  place-items: center;\n  border: 1px solid var(--rule-soft);\n  min-height: 280px;\n}\n.photo.tall { aspect-ratio: 3 / 4; }\n.photo.wide { aspect-ratio: 16 / 11; }\n.photo .ph-stripes {\n  position: absolute;\n  inset: 0;\n  background-image: repeating-linear-gradient(\n    135deg,\n    transparent 0 12px,\n    rgba(168, 90, 60, 0.08) 12px 13px\n  );\n}\n.photo .ph-tag {\n  position: absolute;\n  top: 16px;\n  left: 16px;\n  font-family: var(--mono);\n  font-size: 9px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--umber);\n  background: var(--bone);\n  padding: 4px 8px;\n  border: 1px solid var(--rule);\n}\n.photo .ph-num {\n  position: absolute;\n  bottom: 16px;\n  right: 16px;\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.18em;\n  color: var(--umber);\n}\n.photo .ph-cap {\n  position: absolute;\n  bottom: 16px;\n  left: 16px;\n  font-family: var(--editorial);\n  font-style: italic;\n  font-size: 14px;\n  color: var(--umber);\n  max-width: 22ch;\n  line-height: 1.3;\n}\n\n.photo-rules {\n  margin-top: var(--s-7);\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: var(--s-7);\n}\n.photo-rules h4 {\n  font-family: var(--display);\n  font-weight: 400;\n  font-size: 22px;\n  margin-bottom: var(--s-4);\n  letter-spacing: -0.01em;\n}\n.photo-rules ul { list-style: none; }\n.photo-rules li {\n  display: grid;\n  grid-template-columns: 16px 1fr;\n  gap: 12px;\n  padding: 10px 0;\n  border-top: 1px solid var(--rule-soft);\n  font-size: 14px;\n  line-height: 1.5;\n  color: var(--umber);\n}\n.photo-rules li::before {\n  content: \"—\";\n  font-family: var(--mono);\n  color: var(--terracotta);\n}\n.photo-rules .do li::before { content: \"+\"; }\n.photo-rules .dont li::before { content: \"×\"; color: var(--terracotta); }\n\n/* ─── §08 Layouts ──────────────────────────────────────────── */\n.layout-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: var(--s-7);\n  margin-bottom: var(--s-7);\n}\n.layout {\n  aspect-ratio: 1 / 1.414;\n  background: var(--bone);\n  border: 1px solid var(--rule-soft);\n  padding: 28px 32px;\n  position: relative;\n  display: flex;\n  flex-direction: column;\n  box-shadow: 0 30px 60px -30px rgba(26, 20, 17, 0.25);\n  overflow: hidden;\n}\n.layout.cover-prop { background: var(--ivory); padding: 32px; }\n.layout-eyebrow { font-family: var(--mono); font-size: 8px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--terracotta); }\n.layout-title { font-family: var(--display); font-weight: 400; font-size: 38px; line-height: 1.0; letter-spacing: -0.015em; margin-top: auto; }\n.layout-title em { font-family: var(--editorial); font-style: italic; font-weight: 300; }\n.layout-meta { font-family: var(--mono); font-size: 8px; letter-spacing: 0.18em; line-height: 1.6; color: var(--umber); }\n.layout-rule { height: 1px; background: var(--rule); margin: 14px 0; }\n\n.layout.proposal-page { padding: 28px 32px; }\n.layout-page-head { display: flex; justify-content: space-between; align-items: baseline; }\n.layout-h2 { font-family: var(--display); font-size: 22px; font-weight: 400; letter-spacing: -0.01em; }\n.layout-h2 em { font-family: var(--editorial); font-style: italic; font-weight: 300; }\n.layout-body { font-size: 8px; line-height: 1.7; color: var(--ink); margin-top: 14px; column-count: 2; column-gap: 16px; flex: 1; }\n.layout-body p + p { margin-top: 0.7em; }\n.layout-pull {\n  font-family: var(--editorial);\n  font-style: italic;\n  font-weight: 300;\n  font-size: 14px;\n  line-height: 1.3;\n  color: var(--umber);\n  border-top: 1px solid var(--rule);\n  border-bottom: 1px solid var(--rule);\n  padding: 12px 0;\n  margin: 14px 0;\n}\n.layout-foot { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 7px; letter-spacing: 0.2em; color: var(--umber); padding-top: 10px; border-top: 1px solid var(--rule-soft); }\n\n.deck-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: var(--s-5);\n}\n.deck {\n  aspect-ratio: 16 / 9;\n  position: relative;\n  overflow: hidden;\n  box-shadow: 0 30px 60px -30px rgba(26, 20, 17, 0.25);\n  border: 1px solid var(--rule-soft);\n  padding: 28px 36px;\n  display: flex;\n  flex-direction: column;\n  justify-content: space-between;\n}\n.deck.dark { background: var(--ink); color: var(--bone); }\n.deck.cream { background: var(--ivory); color: var(--ink); }\n.deck.terra { background: var(--terracotta); color: var(--bone); }\n.deck.bone { background: var(--bone); color: var(--ink); }\n.deck-eyebrow { font-family: var(--mono); font-size: 8px; letter-spacing: 0.22em; opacity: 0.7; }\n.deck-title { font-family: var(--display); font-weight: 400; font-size: 44px; line-height: 0.95; letter-spacing: -0.02em; max-width: 14ch; }\n.deck-title em { font-family: var(--editorial); font-style: italic; font-weight: 300; }\n.deck-foot { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 8px; letter-spacing: 0.18em; opacity: 0.7; }\n\n/* ─── §09 Digital ──────────────────────────────────────────── */\n.web-frame {\n  aspect-ratio: 16 / 10;\n  background: var(--bone);\n  border: 1px solid var(--rule-soft);\n  position: relative;\n  overflow: hidden;\n  box-shadow: 0 30px 60px -30px rgba(26, 20, 17, 0.25);\n  display: flex;\n  flex-direction: column;\n}\n.web-chrome { display: flex; align-items: center; gap: 6px; padding: 10px 14px; border-bottom: 1px solid var(--rule-soft); background: var(--paper); }\n.web-chrome .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--rule); }\n.web-chrome .url { font-family: var(--mono); font-size: 10px; color: var(--umber); margin-left: 18px; letter-spacing: 0.05em; }\n.web-content { padding: 28px 40px; flex: 1; display: flex; flex-direction: column; }\n.web-nav { display: flex; justify-content: space-between; align-items: center; padding-bottom: 18px; border-bottom: 1px solid var(--rule-soft); }\n.web-nav .lh-mark svg { width: 56px; height: auto; }\n.web-nav ul { list-style: none; display: flex; gap: 28px; }\n.web-nav li { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink); }\n.web-hero { flex: 1; display: grid; grid-template-columns: 1.2fr 1fr; gap: 32px; padding: 36px 0 0; align-items: end; }\n.web-hero h1 { font-family: var(--display); font-weight: 400; font-size: 64px; line-height: 0.95; letter-spacing: -0.025em; color: var(--ink); }\n.web-hero h1 em { font-family: var(--editorial); font-style: italic; font-weight: 300; }\n.web-hero .sub { font-family: var(--editorial); font-style: italic; font-size: 18px; color: var(--umber); margin-top: 16px; line-height: 1.4; max-width: 36ch; }\n.web-hero-img { position: relative; aspect-ratio: 3/4; background: var(--ivory); border: 1px solid var(--rule-soft); }\n.web-hero-img .ph-stripes { position: absolute; inset: 0; background-image: repeating-linear-gradient(135deg, transparent 0 10px, rgba(168, 90, 60, 0.08) 10px 11px); }\n.web-hero-img .lab { position: absolute; bottom: 10px; left: 10px; font-family: var(--mono); font-size: 8px; letter-spacing: 0.22em; color: var(--umber); }\n\n.social-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr 1fr;\n  gap: var(--s-5);\n  margin-top: var(--s-5);\n}\n.social {\n  aspect-ratio: 1;\n  position: relative;\n  overflow: hidden;\n  box-shadow: 0 30px 60px -30px rgba(26, 20, 17, 0.25);\n  border: 1px solid var(--rule-soft);\n  padding: 28px;\n  display: flex;\n  flex-direction: column;\n  justify-content: space-between;\n}\n.social.bone { background: var(--bone); color: var(--ink); }\n.social.umber { background: var(--umber); color: var(--bone); }\n.social.terra { background: var(--terracotta); color: var(--bone); }\n.social-eyebrow { font-family: var(--mono); font-size: 9px; letter-spacing: 0.22em; opacity: 0.7; }\n.social-title { font-family: var(--display); font-weight: 400; font-size: 32px; line-height: 1.0; letter-spacing: -0.015em; }\n.social-title em { font-family: var(--editorial); font-style: italic; font-weight: 300; }\n.social-mark svg { width: 32px; height: auto; }\n\n/* ─── §10 Voice ────────────────────────────────────────────── */\n.voice-grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 0;\n  border: 1px solid var(--rule-soft);\n}\n.voice-card {\n  padding: var(--s-7);\n  border-right: 1px solid var(--rule-soft);\n}\n.voice-card:last-child { border-right: 0; }\n.voice-card h4 {\n  font-family: var(--display);\n  font-style: italic;\n  font-weight: 400;\n  font-size: 28px;\n  letter-spacing: -0.01em;\n  color: var(--terracotta);\n  margin-bottom: var(--s-4);\n}\n.voice-card.h4-edi h4 { font-family: var(--editorial); font-style: italic; font-weight: 300; }\n.voice-card .pair {\n  display: grid;\n  grid-template-columns: 14px 1fr;\n  gap: 10px;\n  padding: 10px 0;\n  border-top: 1px solid var(--rule-soft);\n  font-size: 14px;\n  line-height: 1.5;\n  color: var(--umber);\n}\n.voice-card .pair::before { font-family: var(--mono); font-size: 12px; }\n.voice-card .we::before { content: \"+\"; color: var(--terracotta); }\n.voice-card .not::before { content: \"—\"; color: var(--umber); }\n\n.tone-examples {\n  margin-top: var(--s-7);\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: var(--s-7);\n}\n.tone-block { padding-top: var(--s-5); border-top: 1px solid var(--rule); }\n.tone-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--terracotta); margin-bottom: var(--s-4); }\n.tone-block .ex {\n  font-family: var(--editorial);\n  font-style: italic;\n  font-weight: 300;\n  font-size: 22px;\n  line-height: 1.4;\n  color: var(--ink);\n}\n.tone-block .ex + .ex { margin-top: var(--s-4); padding-top: var(--s-4); border-top: 1px solid var(--rule-soft); }\n\n/* ─── Footer ───────────────────────────────────────────────── */\n.colophon {\n  background: var(--ink);\n  color: var(--bone);\n  padding: var(--s-9) 0;\n}\n.colophon-grid {\n  display: grid;\n  grid-template-columns: 2fr 1fr 1fr 1fr;\n  gap: var(--s-7);\n  align-items: start;\n}\n.colophon h3 {\n  font-family: var(--display);\n  font-weight: 400;\n  font-size: 56px;\n  line-height: 0.95;\n  letter-spacing: -0.02em;\n  margin-bottom: var(--s-5);\n}\n.colophon h3 em { font-family: var(--editorial); font-style: italic; font-weight: 300; }\n.colophon .col-meta { font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--clay-soft); margin-bottom: var(--s-3); }\n.colophon dd { font-family: var(--editorial); font-size: 16px; line-height: 1.5; color: var(--bone); }\n.colophon dd + dd { margin-top: 4px; }\n.colophon .stamp { font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em; color: var(--clay-soft); margin-top: var(--s-7); padding-top: var(--s-5); border-top: 1px solid rgba(242, 235, 224, 0.15); display: flex; justify-content: space-between; }\n\n/* ─── Responsive ───────────────────────────────────────────── */\n@media (max-width: 1100px) {\n  :root { --gutter: 48px; }\n  .cover-grid { grid-template-columns: 1fr; }\n  .cover-left { border-right: 0; border-bottom: 1px solid var(--rule); }\n  .foundation-grid, .statio-grid, .layout-grid, .photo-grid, .photo-rules, .tone-examples, .color-usage { grid-template-columns: 1fr; }\n  .colophon-grid { grid-template-columns: 1fr 1fr; }\n  .color-grid { grid-template-columns: repeat(3, 1fr); }\n  .swatch { border-bottom: 1px solid var(--rule-soft); }\n  .icon-grid { grid-template-columns: repeat(4, 1fr); }\n  .icon-cell:nth-child(6n) { border-right: 1px solid var(--rule-soft); }\n  .icon-cell:nth-child(4n) { border-right: 0; }\n  .voice-grid { grid-template-columns: 1fr; }\n  .voice-card { border-right: 0; border-bottom: 1px solid var(--rule-soft); }\n  .deck-grid, .social-grid, .misuse-grid, .logo-grid-3, .photo-grid-2, .sizing-row { grid-template-columns: 1fr 1fr; }\n  .type-spec { grid-template-columns: 1fr; }\n  .type-card { border-right: 0; }\n  .scale-row { grid-template-columns: 100px 1fr; }\n  .scale-row .meta { display: none; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- ════════════════════════════════════════════════════════════ -->\n<!-- COVER                                                         -->\n<!-- ════════════════════════════════════════════════════════════ -->\n<section class=\"cover\" data-screen-label=\"01 Cover\">\n  <div class=\"cover-grid\">\n    <div class=\"cover-left\">\n      <div class=\"cover-topbar\">\n        <span>Maru Spaces<\u002Fspan>\n        <span>Brand Guide / Vol. 01<\u002Fspan>\n        <span>2026<\u002Fspan>\n      <\u002Fdiv>\n\n      <div>\n        <div class=\"label\" style=\"margin-bottom: 24px; color: var(--terracotta);\">A Document of Identity &amp; Intent<\u002Fdiv>\n        <h1 class=\"cover-title\">\n          Maru\n          <span class=\"ital\">Spaces<\u002Fspan>\n        <\u002Fh1>\n      <\u002Fdiv>\n\n      <dl class=\"cover-foot\">\n        <div>\n          <dt>Edition<\u002Fdt>\n          <dd>First, Revision A<\u002Fdd>\n        <\u002Fdiv>\n        <div>\n          <dt>Authored<\u002Fdt>\n          <dd>Ramo Phalatse, May 2026<\u002Fdd>\n        <\u002Fdiv>\n        <div>\n          <dt>Reference<\u002Fdt>\n          <dd>MS · BG · 2026.01<\u002Fdd>\n        <\u002Fdiv>\n      <\u002Fdl>\n    <\u002Fdiv>\n\n    <div class=\"cover-right\">\n      <div class=\"cover-topbar\">\n        <span>§ Identity System<\u002Fspan>\n        <span style=\"opacity:0.5;\">— ◆ —<\u002Fspan>\n        <span>Logomark<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"cover-mark\">\n        <!-- Logomark: the negative-space \"A\" from the Maru wordmark, holding a cloud within its counter — Maru = cloud (Setswana); Mapula, mother of rain. -->\n        <img src=\"1f1e1ced-cffe-4ecb-acba-e3a58ef8189c\" class=\"mark-svg\" alt=\"Maru Spaces logomark — A with cloud\">\n      <\u002Fdiv>\n\n      <p class=\"cover-caption\">\n        <em>Maru<\u002Fem> — cloud, in Setswana. A quiet tribute to <em>Mapula,<\u002Fem> mother of rain. The mark gathers above; the rain — blessings, beginnings, growth — falls below the line.\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════════════════════════ -->\n<!-- §01 FOUNDATION                                                -->\n<!-- ════════════════════════════════════════════════════════════ -->\n<section class=\"section\" data-screen-label=\"02 Foundation\">\n  <div class=\"shell\">\n    <div class=\"section-meta\">\n      <div class=\"sec-num\">§ 01 / 09<\u002Fdiv>\n      <div>\n        <div class=\"sec-eyebrow\">Foundation — On What We Believe<\u002Fdiv>\n        <h2 class=\"sec-title\">A practice of <em>quiet<\u002Fem> consequence.<\u002Fh2>\n        <p class=\"sec-lede\">\n          Maru Spaces is a full-service architectural practice working across government, commercial, and high-end residential briefs. We design buildings and the documents that surround them with the same care: refined, considered, and made to outlast their season.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"foundation-grid\">\n      <div class=\"principle-list\">\n        <div class=\"principle\">\n          <div class=\"principle-num\">i.<\u002Fdiv>\n          <div>\n            <div class=\"principle-title\">Restraint as a tool<\u002Fdiv>\n            <p class=\"principle-body\">We design with what is necessary. Every line, weight, and word earns its place. Where another firm adds, we subtract — and the work is stronger for it.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"principle\">\n          <div class=\"principle-num\">ii.<\u002Fdiv>\n          <div>\n            <div class=\"principle-title\">Of the ground it stands on<\u002Fdiv>\n            <p class=\"principle-body\">Material, climate, light, and history are first authors. Our work belongs to the place it occupies — local in palette and posture, global in standard.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"principle\">\n          <div class=\"principle-num\">iii.<\u002Fdiv>\n          <div>\n            <div class=\"principle-title\">Drawn before it is built<\u002Fdiv>\n            <p class=\"principle-body\">The drawing is the building, in advance. We treat documentation as design — proposals, plans, and presentations are all part of the architecture.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"principle\">\n          <div class=\"principle-num\">iv.<\u002Fdiv>\n          <div>\n            <div class=\"principle-title\">Time, as a material<\u002Fdiv>\n            <p class=\"principle-body\">We design for thirty years, not three. Trends fade; proportion, light, and craft do not. Our identity is built on the same premise.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <div class=\"pull-quote\">\n          The work should feel as if it has always been there — and as if no one in particular put it there.\n        <\u002Fdiv>\n        <p class=\"body-copy\" style=\"margin-top: 32px; color: var(--umber);\">\n          This guide is the sum of those instincts, set down in writing so the practice can speak with one voice across letters, drawings, sites, and screens. It is not a rulebook. It is a measuring tape — for tone, for proportion, for what belongs.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════════════════════════ -->\n<!-- §02 LOGO                                                      -->\n<!-- ════════════════════════════════════════════════════════════ -->\n<section class=\"section\" data-screen-label=\"03 Logo\">\n  <div class=\"shell\">\n    <div class=\"section-meta\">\n      <div class=\"sec-num\">§ 02 / 09<\u002Fdiv>\n      <div>\n        <div class=\"sec-eyebrow\">Identity — Logo &amp; Logomark<\u002Fdiv>\n        <h2 class=\"sec-title\">The mark, <em>twice<\u002Fem> stated.<\u002Fh2>\n        <p class=\"sec-lede\">\n          Our identity exists in two registers: a full wordmark for primary use, and a compact logomark drawn from the negative space of its central letter. Both share the same architecture — a hairline, a pediment, and a measured foot.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Primary wordmark -->\n    <div style=\"margin-bottom: 8px;\" class=\"label\">A. Primary wordmark — the source artwork, unaltered<\u002Fdiv>\n    <div class=\"logo-stage\">\n      <span class=\"corner c-tl\"><\u002Fspan><span class=\"corner c-tr\"><\u002Fspan>\n      <span class=\"corner c-bl\"><\u002Fspan><span class=\"corner c-br\"><\u002Fspan>\n\n      <img src=\"e8470210-2838-454f-b7d9-b142ecb37f9a\" class=\"wordmark-svg\" alt=\"Maru wordmark\" style=\"width: min(620px, 64%); height: auto;\">\n\n      <span class=\"stage-tag\">PRIMARY · ON BONE · 100%<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- Variants -->\n    <div class=\"logo-grid-3\">\n      <div class=\"logo-tile\">\n        <img src=\"1f1e1ced-cffe-4ecb-acba-e3a58ef8189c\" alt=\"Maru logomark\" style=\"width:55%; height:auto; \">\n        <span class=\"logo-tile-tag\">Logomark · Ink on Bone<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"logo-tile dark\">\n        <img src=\"1f1e1ced-cffe-4ecb-acba-e3a58ef8189c\" alt=\"Maru logomark\" style=\"width:55%; height:auto; filter: invert(1) brightness(1.05);\">\n        <span class=\"logo-tile-tag\">Reversed · Bone on Ink<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"logo-tile terracotta\">\n        <img src=\"1f1e1ced-cffe-4ecb-acba-e3a58ef8189c\" alt=\"Maru logomark\" style=\"width:55%; height:auto; filter: invert(1) brightness(1.05);\">\n        <span class=\"logo-tile-tag\">Bone on Terracotta<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Clearspace -->\n    <div style=\"display:grid; grid-template-columns: 1fr 1fr; gap: var(--s-7); margin-top: var(--s-9);\">\n      <div>\n        <div class=\"label\" style=\"margin-bottom:8px;\">B. Clear space<\u002Fdiv>\n        <div class=\"clearspace-stage\">\n          <svg class=\"clearspace-svg\" viewBox=\"0 0 600 360\" xmlns=\"http://www.w3.org/2000/svg\">\n            <!-- Clearspace rectangle -->\n            <rect x=\"60\" y=\"60\" width=\"480\" height=\"240\" fill=\"none\" stroke=\"#A85A3C\" stroke-width=\"0.8\" stroke-dasharray=\"3 3\"><\u002Frect>\n            <!-- X measure markers -->\n            <g font-family=\"JetBrains Mono, monospace\" font-size=\"9\" letter-spacing=\"2\" fill=\"#5A3E2E\">\n              <text x=\"40\" y=\"184\" text-anchor=\"middle\">x<\u002Ftext>\n              <text x=\"560\" y=\"184\" text-anchor=\"middle\">x<\u002Ftext>\n              <text x=\"300\" y=\"50\" text-anchor=\"middle\">x<\u002Ftext>\n              <text x=\"300\" y=\"320\" text-anchor=\"middle\">x<\u002Ftext>\n            <\u002Fg>\n            <!-- Margin guide lines (cap-height x measure) -->\n            <line x1=\"160\" y1=\"60\" x2=\"160\" y2=\"300\" stroke=\"#A85A3C\" stroke-width=\"0.4\" stroke-dasharray=\"2 3\"><\u002Fline>\n            <line x1=\"440\" y1=\"60\" x2=\"440\" y2=\"300\" stroke=\"#A85A3C\" stroke-width=\"0.4\" stroke-dasharray=\"2 3\"><\u002Fline>\n            <line x1=\"160\" y1=\"140\" x2=\"440\" y2=\"140\" stroke=\"#A85A3C\" stroke-width=\"0.4\" stroke-dasharray=\"2 3\"><\u002Fline>\n            <line x1=\"160\" y1=\"220\" x2=\"440\" y2=\"220\" stroke=\"#A85A3C\" stroke-width=\"0.4\" stroke-dasharray=\"2 3\"><\u002Fline>\n\n            <!-- The wordmark image, embedded -->\n            <image href=\"e8470210-2838-454f-b7d9-b142ecb37f9a\" x=\"180\" y=\"148\" width=\"240\" height=\"99\" preserveAspectRatio=\"xMidYMid meet\"><\u002Fimage>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <p class=\"body-copy\" style=\"margin-top: 16px; font-size: 13px; color: var(--umber);\">\n          The clear space (<span style=\"font-family:var(--mono); font-size:11px;\">x<\u002Fspan>) is equal to the cap-height of the M. No element — type, image, edge, fold — may enter this margin.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <div>\n        <div class=\"label\" style=\"margin-bottom:8px;\">C. Minimum sizes<\u002Fdiv>\n        <div class=\"sizing-row\">\n          <div class=\"sizing-cell\">\n            <img src=\"e8470210-2838-454f-b7d9-b142ecb37f9a\" alt=\"\" style=\"width: 100%; max-width: 180px;\">\n            <span class=\"lab\">Print<br>≥ 28mm<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"sizing-cell\">\n            <img src=\"e8470210-2838-454f-b7d9-b142ecb37f9a\" alt=\"\" style=\"width: 75%; max-width: 130px;\">\n            <span class=\"lab\">Digital<br>≥ 120px<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"sizing-cell\">\n            <img src=\"1f1e1ced-cffe-4ecb-acba-e3a58ef8189c\" alt=\"Maru logomark\" style=\"width:50%; height:auto; \">\n            <span class=\"lab\">Mark · Avatar<br>≥ 24px<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"sizing-cell\">\n            <img src=\"1f1e1ced-cffe-4ecb-acba-e3a58ef8189c\" alt=\"Maru logomark\" style=\"width:36%; height:auto; \">\n            <span class=\"lab\">Favicon<br>16px<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"body-copy\" style=\"margin-top: 16px; font-size: 13px; color: var(--umber);\">\n          Below 120px digital or 28mm print, drop the SPACES tagline. Below 24px, use the cloud mark alone.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Misuse -->\n    <div style=\"margin-top: var(--s-9);\">\n      <div class=\"label\" style=\"margin-bottom: var(--s-4);\">D. Don't<\u002Fdiv>\n      <div class=\"misuse-grid\">\n        <div class=\"misuse-cell\">\n          <span class=\"x\">×<\u002Fspan>\n          <img src=\"e8470210-2838-454f-b7d9-b142ecb37f9a\" alt=\"\" style=\"width: 70%; transform: skewX(-12deg);\">\n          <span class=\"lab\">Skew or italicise the wordmark<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"misuse-cell\">\n          <span class=\"x\">×<\u002Fspan>\n          <img src=\"e8470210-2838-454f-b7d9-b142ecb37f9a\" alt=\"\" style=\"width: 70%; filter: drop-shadow(2px 2px 0 #A85A3C);\">\n          <span class=\"lab\">Apply gradients, shadows, or effects<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"misuse-cell\">\n          <span class=\"x\">×<\u002Fspan>\n          <svg viewBox=\"0 0 200 100\" width=\"80%\" xmlns=\"http://www.w3.org/2000/svg\">\n            <text x=\"100\" y=\"55\" text-anchor=\"middle\" font-family=\"Helvetica, sans-serif\" font-size=\"36\" font-weight=\"700\" letter-spacing=\"1\" fill=\"#1A1411\">MARU<\u002Ftext>\n          <\u002Fsvg>\n          <span class=\"lab\">Substitute the typeface<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"misuse-cell\" style=\"background: linear-gradient(135deg, #A85A3C, #C89478);\">\n          <span class=\"x\">×<\u002Fspan>\n          <img src=\"e8470210-2838-454f-b7d9-b142ecb37f9a\" alt=\"\" style=\"width: 70%; opacity: 0.55;\">\n          <span class=\"lab\" style=\"color: var(--bone);\">Place on busy or low-contrast grounds<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"misuse-cell\">\n          <span class=\"x\">×<\u002Fspan>\n          <div style=\"border: 1.5px solid #1A1411; padding: 10px 18px;\">\n            <img src=\"e8470210-2838-454f-b7d9-b142ecb37f9a\" alt=\"\" style=\"width: 130px;\">\n          <\u002Fdiv>\n          <span class=\"lab\">Enclose in shapes or boxes<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"misuse-cell\">\n          <span class=\"x\">×<\u002Fspan>\n          <div style=\"display:flex; flex-direction:column; align-items:center; gap:6px;\">\n            <img src=\"e8470210-2838-454f-b7d9-b142ecb37f9a\" alt=\"\" style=\"width: 130px;\">\n            <div style=\"font-family: var(--mono); font-size: 7px; letter-spacing: 0.18em; color: var(--ink);\">SINCE 2014  ·  CAPE TOWN<\u002Fdiv>\n          <\u002Fdiv>\n          <span class=\"lab\">Add unauthorised taglines<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════════════════════════ -->\n<!-- §03 TYPOGRAPHY                                                -->\n<!-- ════════════════════════════════════════════════════════════ -->\n<section class=\"section\" data-screen-label=\"04 Typography\">\n  <div class=\"shell\">\n    <div class=\"section-meta\">\n      <div class=\"sec-num\">§ 03 / 09<\u002Fdiv>\n      <div>\n        <div class=\"sec-eyebrow\">Typography — A System of Voices<\u002Fdiv>\n        <h2 class=\"sec-title\">Four <em>typefaces<\u002Fem>, four registers.<\u002Fh2>\n        <p class=\"sec-lede\">\n          Each face has a single role and earns it. <em>DM Serif Display<\u002Fem>, a high-contrast Didone, carries the brand voice. <em>Cormorant Garamond<\u002Fem>, a soft humanist serif, holds the editorial moments. <em>DM Sans<\u002Fem>, a refined geometric sans, does the daily work. <em>JetBrains Mono<\u002Fem> handles the technical line.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"type-spec\">\n      <div class=\"type-card display-card\">\n        <div class=\"role\">A · Display · DM Serif Display<\u002Fdiv>\n        <div class=\"name\">DM Serif Display<\u002Fdiv>\n        <div class=\"meta\">REGULAR · ITALIC  ·  GOOGLE FONTS  ·  TIFFIN ALTERNATIVE<\u002Fdiv>\n        <div class=\"specimen\">Aa<\u002Fdiv>\n        <div class=\"glyphs\">ABCDEFGHIJKLMNOPQRSTUVWXYZ<br>abcdefghijklmnopqrstuvwxyz<br>0123456789  ·  &amp;  ·  ÆŒæœ<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"type-card serif-card\">\n        <div class=\"role\">B · Editorial · Cormorant Garamond<\u002Fdiv>\n        <div class=\"name\">Cormorant Garamond<\u002Fdiv>\n        <div class=\"meta\">LIGHT · REGULAR · ITALIC  ·  GOOGLE FONTS<\u002Fdiv>\n        <div class=\"specimen\">Aa<\u002Fdiv>\n        <div class=\"glyphs\">A practice of quiet consequence — drawn before it is built, and meant to outlast its season.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"type-card sans-card\">\n        <div class=\"role\">C · Body &amp; UI · DM Sans<\u002Fdiv>\n        <div class=\"name\">DM Sans<\u002Fdiv>\n        <div class=\"meta\">300 · 400 · 500 · 600  ·  GOOGLE FONTS  ·  EARLY SANS FAMILY<\u002Fdiv>\n        <div class=\"specimen\">Aa<\u002Fdiv>\n        <div class=\"glyphs\">Used for body copy, navigation, captions, forms, and any sustained reading. Calm, clear, characterful.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"type-card mono-card\">\n        <div class=\"role\">D · Technical · JetBrains Mono<\u002Fdiv>\n        <div class=\"name\">JetBrains Mono<\u002Fdiv>\n        <div class=\"meta\">LIGHT · REGULAR · MEDIUM  ·  GOOGLE FONTS<\u002Fdiv>\n        <div class=\"specimen\">Aa<\u002Fdiv>\n        <div class=\"glyphs\">MS · BG · 2026.01<br>§ 03 / 09  ·  PROJECT REF<br>0.5pt RULES  ·  9PT LABELS<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Type scale -->\n    <div class=\"type-scale\">\n      <div class=\"label\" style=\"margin-bottom: var(--s-4);\">Type scale — primary use<\u002Fdiv>\n      <div class=\"scale-row\">\n        <span class=\"key\">Display<\u002Fspan>\n        <span class=\"sample\" style=\"font-family: var(--display); font-weight: 400; font-size: 88px; letter-spacing: -0.02em;\">A quiet practice.<\u002Fspan>\n        <span class=\"meta\">DM Serif Display · 88 / 84<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"scale-row\">\n        <span class=\"key\">Section<\u002Fspan>\n        <span class=\"sample\" style=\"font-family: var(--display); font-weight: 400; font-size: 56px; letter-spacing: -0.015em;\">Of the ground it stands on<\u002Fspan>\n        <span class=\"meta\">DM Serif Display · 56 / 56<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"scale-row\">\n        <span class=\"key\">Editorial<\u002Fspan>\n        <span class=\"sample\" style=\"font-family: var(--editorial); font-style: italic; font-weight: 300; font-size: 32px;\">Drawn before it is built.<\u002Fspan>\n        <span class=\"meta\">Cormorant · 32 / 40 · italic<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"scale-row\">\n        <span class=\"key\">Heading<\u002Fspan>\n        <span class=\"sample\" style=\"font-family: var(--display); font-weight: 400; font-size: 24px;\">Project Brief — Vol. 12<\u002Fspan>\n        <span class=\"meta\">DM Serif Display · 24 / 30<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"scale-row\">\n        <span class=\"key\">Body<\u002Fspan>\n        <span class=\"sample\" style=\"font-family: var(--sans); font-weight: 400; font-size: 16px; line-height: 1.6;\">We design buildings and the documents that surround them with the same care.<\u002Fspan>\n        <span class=\"meta\">DM Sans · 16 / 26 · 400<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"scale-row\">\n        <span class=\"key\">Caption<\u002Fspan>\n        <span class=\"sample\" style=\"font-family: var(--sans); font-weight: 500; font-size: 13px; color: var(--umber);\">Plate 04 — North-eastern elevation, study residence.<\u002Fspan>\n        <span class=\"meta\">DM Sans · 13 / 20 · 500<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"scale-row\">\n        <span class=\"key\">Label<\u002Fspan>\n        <span class=\"sample\" style=\"font-family: var(--mono); font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;\">§ 04 — COLOUR &amp; MATERIAL<\u002Fspan>\n        <span class=\"meta\">JetBrains Mono · 11 · +22% tracking<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════════════════════════ -->\n<!-- §04 COLOUR                                                    -->\n<!-- ════════════════════════════════════════════════════════════ -->\n<section class=\"section\" data-screen-label=\"05 Colour\">\n  <div class=\"shell\">\n    <div class=\"section-meta\">\n      <div class=\"sec-num\">§ 04 / 09<\u002Fdiv>\n      <div>\n        <div class=\"sec-eyebrow\">Colour — A Palette of Place<\u002Fdiv>\n        <h2 class=\"sec-title\">Bone, clay, <em>terracotta<\u002Fem>, ink.<\u002Fh2>\n        <p class=\"sec-lede\">\n          A six-tone palette drawn from earth, stone, and shadow. Bone and Ink are the constants — the page and the line. Terracotta is the single gesture of warmth, used sparingly. Clay and Umber sit between them as supporting tones.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"color-grid\">\n      <div class=\"swatch bone\">\n        <div class=\"num\">01 / 06<\u002Fdiv>\n        <div>\n          <div class=\"name\">Bone<\u002Fdiv>\n          <div class=\"data\">\n            <span class=\"hex\">#F2EBE0<\u002Fspan>\n            <span class=\"rgb\">242 · 235 · 224<\u002Fspan>\n            <span class=\"rgb\" style=\"opacity:.6;\">PMS Warm Gray 1<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n bone); flex: 60;\">60<\u002Fdiv>\n          <div style=\"background: var(--ink); color: var(--bone); flex: 24;\">24<\u002Fdiv>\n          <div style=\"background: var(--ivory); flex: 8;\">8<\u002Fdiv>\n          <div style=\"background: var(--clay); flex: 5;\">5<\u002Fdiv>\n          <div style=\"background: var(--terracotta); color: var(--bone); flex: 3;\">3<\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"body-copy\" style=\"margin-top: var(--s-4); font-size: 13px; color: var(--umber);\">\n          Bone and Ink should dominate. Terracotta appears at most 3% of any composition — a single rule, a tag, a numeral, a button.\n        <\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div class=\"usage-cap\">Permitted pairings<\u002Fdiv>\n        <div style=\"display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;\">\n          <div style=\"aspect-ratio: 1; background: var(--bone); border: 1px solid var(--rule-soft); display:grid; place-items:center; font-family: var(--display); font-size: 22px;\">Aa<\u002Fdiv>\n          <div style=\"aspect-ratio: 1; background: var(--ink); color: var(--bone); display:grid; place-items:center; font-family: var(--display); font-size: 22px;\">Aa<\u002Fdiv>\n          <div style=\"aspect-ratio: 1; background: var(--terracotta); color: var(--bone); display:grid; place-items:center; font-family: var(--display); font-size: 22px;\">Aa<\u002Fdiv>\n          <div style=\"aspect-ratio: 1; background: var(--umber); color: var(--bone); display:grid; place-items:center; font-family: var(--display); font-size: 22px;\">Aa<\u002Fdiv>\n          <div style=\"aspect-ratio: 1; background: var(--bone); color: var(--terracotta); border: 1px solid var(--rule-soft); display:grid; place-items:center; font-family: var(--display); font-size: 22px;\">Aa<\u002Fdiv>\n          <div style=\"aspect-ratio: 1; background: var(--ivory); color: var(--umber); border: 1px solid var(--rule-soft); display:grid; place-items:center; font-family: var(--display); font-size: 22px;\">Aa<\u002Fdiv>\n          <div style=\"aspect-ratio: 1; background: var(--clay); color: var(--ink); display:grid; place-items:center; font-family: var(--display); font-size: 22px;\">Aa<\u002Fdiv>\n          <div style=\"aspect-ratio: 1; background: var(--umber); color: var(--clay-soft); display:grid; place-items:center; font-family: var(--display); font-size: 22px;\">Aa<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════════════════════════ -->\n<!-- §05 ICONS & ILLUSTRATIONS                                     -->\n<!-- ════════════════════════════════════════════════════════════ -->\n<section class=\"section\" data-screen-label=\"06 Icons\">\n  <div class=\"shell\">\n    <div class=\"section-meta\">\n      <div class=\"sec-num\">§ 05 / 09<\u002Fdiv>\n      <div>\n        <div class=\"sec-eyebrow\">Mark-making — Icons &amp; Illustration<\u002Fdiv>\n        <h2 class=\"sec-title\">Drawn as <em>miniature<\u002Fem> architecture.<\u002Fh2>\n        <p class=\"sec-lede\">\n          Iconography is built on a 32px grid with a single 0.8px hairline — the same weight as our orthographic drawings. Each icon reads as a tiny elevation or plan: pediments, contours, columns, and section cuts. Illustrations follow the same hand.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"label\" style=\"margin-bottom: var(--s-4);\">A. Icon set — Service marks · drawn as architect's marker sketches with construction guides (32×32, hand-line on terracotta grid)<\u002Fdiv>\n    <!-- Sketchy filter: slight turbulence to make hairlines feel hand-drawn -->\n    <svg width=\"0\" height=\"0\" style=\"position:absolute;\" aria-hidden=\"true\">\n      <defs>\n        <filter id=\"sketch\" x=\"-5%\" y=\"-5%\" width=\"110%\" height=\"110%\">\n          <feTurbulence type=\"fractalNoise\" baseFrequency=\"0.9\" numOctaves=\"2\" seed=\"3\" result=\"noise\"><\u002Ffe
